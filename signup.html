<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up Free — Meridian Institute of AI</title>
<meta name="description" content="Create your free Meridian Institute of AI account and start learning AI today. Free courses in ChatGPT, Claude, Gemini, Finance, Law, and more.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Sign Up Free — Meridian Institute of AI">
<meta property="og:description" content="Create your free Meridian Institute of AI account and start learning AI today. Free courses in ChatGPT, Claude, Gemini, Finance, Law, and more.">
<meta property="og:url" content="https://meridianinstituteai.com/signup.html">
<meta property="og:type" content="website">
<link rel="canonical" href="https://meridianinstituteai.com/signup.html">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #080808;
    --bg-2: #111111;
    --bg-3: #1a1a1a;
    --text: #f0f0f0;
    --text-2: #a0a0a0;
    --text-3: #606060;
    --border: rgba(255,255,255,0.08);
    --border-2: rgba(255,255,255,0.15);
    --border-focus: rgba(91,143,248,0.6);
    --accent: #5b8ff8;
    --accent-dim: rgba(91,143,248,0.1);
    --nav-bg: rgba(8,8,8,0.9);
    --input-bg: #111111;
    --error: #ef4444;
    --error-bg: rgba(239,68,68,0.08);
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.08);
  }
  :root[data-theme="light"] {
    --bg: #fafaf8;
    --bg-2: #f0f0ec;
    --bg-3: #e8e8e2;
    --text: #0a0a0a;
    --text-2: #555550;
    --text-3: #999990;
    --border: rgba(0,0,0,0.1);
    --border-2: rgba(0,0,0,0.18);
    --border-focus: rgba(37,99,235,0.5);
    --accent: #2563eb;
    --accent-dim: rgba(37,99,235,0.08);
    --nav-bg: rgba(250,250,248,0.9);
    --input-bg: #ffffff;
    --error: #dc2626;
    --error-bg: rgba(220,38,38,0.06);
    --success: #16a34a;
    --success-bg: rgba(22,163,74,0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-logo-mark {
    width: 28px; height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600;
    color: var(--accent);
  }
  .nav-logo-text { font-size: 13px; font-weight: 500; color: var(--text); }
  .theme-toggle {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border-2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2); font-size: 14px;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--bg-3); color: var(--text); }

  .page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 24px 60px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
  }
  .card-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .card-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-2);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--input-bg);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--border-focus); }
  input::placeholder { color: var(--text-3); }
  .btn-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    color: var(--text-3);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .switch-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-2);
  }
  .switch-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .switch-link a:hover { text-decoration: underline; }
  .alert {
    padding: 12px 16px;
    border-radius: 9px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 20px;
    display: none;
  }
  .alert.show { display: block; }
  .alert-error { background: var(--error-bg); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }
  .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
  .terms {
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
    margin-top: 20px;
    line-height: 1.6;
  }
  .terms a { color: var(--text-2); text-decoration: underline; }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">M</div>
    <span class="nav-logo-text">Meridian Institute of AI</span>
  </a>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>

<div class="page">
  <div class="card">
    <div class="card-eyebrow">Create your account</div>
    <h1 class="card-title">Join Meridian</h1>
    <p class="card-sub">Free to start. Track your progress, earn certificates, and build real AI skills.</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-group">
      <label for="fullname">Full name</label>
      <input type="text" id="fullname" placeholder="Your name" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <button class="btn-submit" id="signup-btn" onclick="handleSignup()">Create free account</button>

    <div class="divider">or</div>
    <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
    <p class="terms">By signing up you agree to our <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",
    authDomain: "meridian-institute.firebaseapp.com",
    projectId: "meridian-institute",
    storageBucket: "meridian-institute.firebasestorage.app",
    messagingSenderId: "355371012929",
    appId: "1:355371012929:web:244fc2f15ee8ac656887c0",
    measurementId: "G-ER0EN6DE4N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleSignup = async function() {
    const name = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('signup-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');

    if (!name) { showError('Please enter your full name.'); return; }
    if (!email) { showError('Please enter your email address.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating your account...';

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await updateProfile(user, { displayName: name });

      await setDoc(doc(db, 'users', user.uid), {
        name: name,
        email: email,
        createdAt: serverTimestamp(),
        completedModules: [],
        enrolledCourses: ['foundations']
      });

      successMsg.textContent = 'Account created! Taking you to your dashboard...';
      successMsg.classList.add('show');

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = 'Create free account';
      if (err.code === 'auth/email-already-in-use') {
        showError('An account with this email already exists. Try signing in instead.');
      } else if (err.code === 'auth/invalid-email') {
        showError('Please enter a valid email address.');
      } else {
        showError('Something went wrong. Please try again.');
      }
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  window.toggleTheme = function() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    if (html.getAttribute('data-theme') === 'dark') {
      html.setAttribute('data-theme', 'light');
      icon.textContent = '☾';
    } else {
      html.setAttribute('data-theme', 'dark');
      icon.textContent = '☀';
    }
  }
</script>
</body>
</html>
