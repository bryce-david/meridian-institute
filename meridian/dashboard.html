<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #080808; --bg-2: #111111; --bg-3: #1a1a1a; --bg-4: #222222;
    --text: #f0f0f0; --text-2: #a0a0a0; --text-3: #606060;
    --border: rgba(255,255,255,0.08); --border-2: rgba(255,255,255,0.15);
    --accent: #5b8ff8; --accent-dim: rgba(91,143,248,0.1);
    --accent-dim2: rgba(91,143,248,0.05);
    --nav-bg: rgba(8,8,8,0.9);
    --success: #22c55e; --success-bg: rgba(34,197,94,0.08);
    --success-border: rgba(34,197,94,0.2);
  }
  :root[data-theme="light"] {
    --bg: #fafaf8; --bg-2: #f0f0ec; --bg-3: #e8e8e2; --bg-4: #ddddd6;
    --text: #0a0a0a; --text-2: #555550; --text-3: #999990;
    --border: rgba(0,0,0,0.08); --border-2: rgba(0,0,0,0.15);
    --accent: #2563eb; --accent-dim: rgba(37,99,235,0.08);
    --accent-dim2: rgba(37,99,235,0.04);
    --nav-bg: rgba(250,250,248,0.9);
    --success: #16a34a; --success-bg: rgba(22,163,74,0.06);
    --success-border: rgba(22,163,74,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg);
    color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--nav-bg); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-mark {
    width: 28px; height: 28px; border: 1.5px solid var(--accent);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--accent);
  }
  .nav-logo-text { font-size: 13px; font-weight: 500; color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-user {
    font-size: 13px; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .nav-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent-dim); border: 1px solid rgba(91,143,248,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: var(--accent);
  }
  .btn-signout {
    padding: 7px 14px; border-radius: 8px; font-size: 12px;
    font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: transparent; color: var(--text-3);
    border: 1px solid var(--border-2); cursor: pointer; transition: all 0.2s;
  }
  .btn-signout:hover { background: var(--bg-3); color: var(--text); }
  .theme-toggle {
    width: 32px; height: 32px; border-radius: 7px;
    border: 1px solid var(--border-2); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-2); font-size: 14px; transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--bg-3); color: var(--text); }

  .page { padding: 88px 5% 80px; max-width: 1100px; margin: 0 auto; }

  .welcome-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border);
  }
  .welcome-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }
  .welcome-title {
    font-family: 'Cormorant Garamond', serif; font-size: 38px;
    font-weight: 300; color: var(--text); line-height: 1.1;
  }
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 48px;
  }
  .stat-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px;
  }
  .stat-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif; font-size: 36px;
    font-weight: 400; color: var(--text); line-height: 1;
  }
  .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 6px; }

  .section-title {
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-2);
    margin-bottom: 20px;
  }

  .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 48px; }

  .course-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; transition: all 0.2s;
    text-decoration: none; display: block; position: relative; overflow: hidden;
  }
  .course-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
  .course-card.completed { border-color: var(--success-border); }
  .course-card.completed::before {
    content: '';  position: absolute; inset: 0;
    background: var(--success-bg); opacity: 0.5; pointer-events: none;
  }
  .course-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .course-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 100px;
  }
  .badge-free { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(91,143,248,0.2); }
  .badge-done { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .badge-locked { background: var(--bg-4); color: var(--text-3); border: 1px solid var(--border-2); }
  .course-icon { font-size: 28px; }
  .course-name {
    font-size: 16px; font-weight: 500; color: var(--text);
    margin-bottom: 8px; line-height: 1.3;
  }
  .course-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 20px; }
  .course-progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-3); margin-bottom: 6px;
  }
  .course-progress-track {
    height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .course-progress-fill {
    height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s;
  }
  .course-progress-fill.done { background: var(--success); }
  .course-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }
  .course-modules { font-size: 12px; color: var(--text-3); }
  .btn-course {
    font-size: 12px; font-weight: 500; color: var(--accent);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
    transition: gap 0.2s;
  }
  .course-card:hover .btn-course { gap: 8px; }

  .modules-section { margin-bottom: 48px; }
  .module-list { display: flex; flex-direction: column; gap: 10px; }
  .module-item {
    display: flex; align-items: center; gap: 16px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    transition: all 0.2s; text-decoration: none;
  }
  .module-item:hover { border-color: var(--border-2); }
  .module-item.completed { border-color: var(--success-border); }
  .module-num {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500;
    background: var(--bg-4); color: var(--text-3);
  }
  .module-item.completed .module-num { background: var(--success-bg); color: var(--success); }
  .module-item.active .module-num { background: var(--accent-dim); color: var(--accent); }
  .module-info { flex: 1; }
  .module-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .module-meta { font-size: 12px; color: var(--text-3); }
  .module-status { font-size: 12px; font-weight: 500; }
  .status-done { color: var(--success); }
  .status-next { color: var(--accent); }
  .status-locked { color: var(--text-3); }

  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 60vh; font-size: 14px; color: var(--text-3);
  }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: 1fr; }
    .welcome-bar { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">M</div>
    <span class="nav-logo-text">Meridian Institute of AI</span>
  </a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-name" style="font-size:13px; color: var(--text-2);">Loading...</span>
    </div>
    <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
    <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
  </div>
</nav>

<div class="page" id="page-content">
  <div class="loading">Loading your dashboard...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",
    authDomain: "meridian-institute.firebaseapp.com",
    projectId: "meridian-institute",
    storageBucket: "meridian-institute.firebasestorage.app",
    messagingSenderId: "355371012929",
    appId: "1:355371012929:web:244fc2f15ee8ac656887c0",
    measurementId: "G-ER0EN6DE4N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const modules = [
    { id: 'module-1', name: 'What AI Actually Is', duration: '15 min', file: 'module-1-what-ai-actually-is.html' },
    { id: 'module-2', name: 'How AI Models Work', duration: '20 min', file: '#' },
    { id: 'module-3', name: 'Tools That Exist Right Now', duration: '18 min', file: '#' },
    { id: 'module-4', name: 'Prompt Engineering', duration: '25 min', file: '#' },
    { id: 'module-5', name: 'AI Ethics & Real Risks', duration: '20 min', file: '#' },
    { id: 'module-6', name: 'Your First AI Project', duration: '30 min', file: '#' },
  ];

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Learner';
    document.getElementById('nav-name').textContent = firstName;
    document.getElementById('nav-avatar').textContent = firstName.charAt(0).toUpperCase();

    let completedModules = [];
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        completedModules = userDoc.data().completedModules || [];
      }
    } catch (e) { }

    const completedCount = completedModules.length;
    const totalModules = modules.length;
    const progressPct = Math.round((completedCount / totalModules) * 100);

    const firstIncomplete = modules.findIndex(m => !completedModules.includes(m.id));
    const nextModule = firstIncomplete >= 0 ? modules[firstIncomplete] : null;

    document.getElementById('page-content').innerHTML = `
      <div class="welcome-bar">
        <div>
          <div class="welcome-eyebrow">Your dashboard</div>
          <div class="welcome-title">Welcome back,<br>${user.displayName ? user.displayName.split(' ')[0] : 'Learner'}.</div>
        </div>
        ${nextModule ? `<a href="${nextModule.file}" style="padding: 12px 24px; background: var(--accent); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 500; text-decoration: none; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.88" onmouseout="this.style.opacity=1">Continue learning →</a>` : `<div style="font-size:14px; color: var(--success); font-weight:500;">🎉 Course complete!</div>`}
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Modules completed</div>
          <div class="stat-value">${completedCount} <span style="font-size:20px; color: var(--text-3);">/ ${totalModules}</span></div>
          <div class="stat-sub">Foundations of AI</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Course progress</div>
          <div class="stat-value">${progressPct}<span style="font-size:20px; color: var(--text-3);">%</span></div>
          <div class="stat-sub">${progressPct === 100 ? 'Complete — certificate ready' : progressPct === 0 ? 'Just getting started' : 'Keep going'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Certificates earned</div>
          <div class="stat-value">${progressPct === 100 ? '1' : '0'}</div>
          <div class="stat-sub">${progressPct === 100 ? 'Foundations of AI' : 'Complete the course to earn yours'}</div>
        </div>
      </div>

      <div class="modules-section">
        <div class="section-title">Foundations of AI — Module Progress</div>
        <div class="module-list">
          ${modules.map((m, i) => {
            const done = completedModules.includes(m.id);
            const isNext = !done && (i === 0 || completedModules.includes(modules[i-1]?.id));
            const locked = !done && !isNext;
            return `
              <a href="${done || isNext ? m.file : '#'}" class="module-item ${done ? 'completed' : isNext ? 'active' : ''}">
                <div class="module-num">${done ? '✓' : i + 1}</div>
                <div class="module-info">
                  <div class="module-name">${m.name}</div>
                  <div class="module-meta">${m.duration} · Module ${i + 1} of ${totalModules}</div>
                </div>
                <div class="module-status ${done ? 'status-done' : isNext ? 'status-next' : 'status-locked'}">
                  ${done ? 'Completed' : isNext ? 'Continue →' : 'Locked'}
                </div>
              </a>
            `;
          }).join('')}
        </div>
      </div>

      <div>
        <div class="section-title">Your Courses</div>
        <div class="course-grid">
          <a href="module-1-what-ai-actually-is.html" class="course-card ${progressPct === 100 ? 'completed' : ''}">
            <div class="course-card-top">
              <span class="course-badge ${progressPct === 100 ? 'badge-done' : 'badge-free'}">${progressPct === 100 ? 'Completed' : 'Free'}</span>
              <div class="course-icon">🧠</div>
            </div>
            <div class="course-name">Foundations of AI</div>
            <div class="course-desc">What AI is, how it works, and how to use it. The foundation everything else is built on.</div>
            <div class="course-progress-label">
              <span>Progress</span>
              <span>${progressPct}%</span>
            </div>
            <div class="course-progress-track">
              <div class="course-progress-fill ${progressPct === 100 ? 'done' : ''}" style="width: ${progressPct}%"></div>
            </div>
            <div class="course-footer">
              <span class="course-modules">${totalModules} modules</span>
              <span class="btn-course">${progressPct === 100 ? 'Review course' : progressPct === 0 ? 'Start course' : 'Continue'} →</span>
            </div>
          </a>
          <div class="course-card" style="opacity: 0.5; cursor: not-allowed;">
            <div class="course-card-top">
              <span class="course-badge badge-locked">Coming soon</span>
              <div class="course-icon">📈</div>
            </div>
            <div class="course-name">AI in Finance</div>
            <div class="course-desc">Stock analysis, portfolio tools, and financial intelligence powered by AI.</div>
            <div class="course-footer">
              <span class="course-modules">Intermediate · $10</span>
              <span class="btn-course" style="color: var(--text-3);">Notify me</span>
            </div>
          </div>
          <div class="course-card" style="opacity: 0.5; cursor: not-allowed;">
            <div class="course-card-top">
              <span class="course-badge badge-locked">Coming soon</span>
              <div class="course-icon">⚖️</div>
            </div>
            <div class="course-name">AI in Law</div>
            <div class="course-desc">Contract review, legal research, and document analysis using AI tools.</div>
            <div class="course-footer">
              <span class="course-modules">Intermediate · $10</span>
              <span class="btn-course" style="color: var(--text-3);">Notify me</span>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  window.handleSignOut = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }

  window.toggleTheme = function() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    if (html.getAttribute('data-theme') === 'dark') {
      html.setAttribute('data-theme', 'light');
      icon.textContent = '☾';
    } else {
      html.setAttribute('data-theme', 'dark');
      icon.textContent = '☀';
    }
  }
</script>
</body>
</html>
