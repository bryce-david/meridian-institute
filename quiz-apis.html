<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Using AI APIs — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#0F4C81;--accent-dim:rgba(15,76,129,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#0c3d6b;--accent-dim:rgba(12,61,107,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(15,76,129,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>Using AI APIs</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"What does REST stand for in the context of web APIs?",opts:["Rapid Exchange of Structured Text","Representational State Transfer — an architectural style for designing networked APIs using HTTP methods","Remote Execution of Server Tasks","Reliable Event Streaming Technology"],a:1},
  {q:"What HTTP method is typically used to send data to an AI API endpoint?",opts:["GET","POST","DELETE","PATCH"],a:1},
  {q:"What is an API key used for?",opts:["Encrypting response data","Authenticating your application to the API provider and associating requests with your account for billing and rate limiting","Compressing request payloads","Caching previous responses"],a:0},
  {q:"In a chat completions API, what is the 'messages' array?",opts:["A list of previous errors","The conversation history passed to the model — each entry has a role (system, user, or assistant) and content","A list of available models","A queue of pending requests"],a:1},
  {q:"What is a 'token' in the context of LLM APIs?",opts:["A security credential","A unit of text (roughly 3-4 characters or 0.75 words) that the model processes — both input and output are measured in tokens","A single word","A complete sentence"],a:1},
  {q:"What does the 'temperature' parameter control in a completion request?",opts:["Server processing speed","The randomness of the model's output — lower values produce more deterministic responses, higher values more varied ones","The length of the response","The model version used"],a:1},
  {q:"What is 'streaming' in API responses?",opts:["Playing audio from the API","Returning tokens incrementally as they are generated rather than waiting for the full response — reduces perceived latency","Sending multiple requests simultaneously","A method for compressing large responses"],a:1},
  {q:"What is the purpose of a 'system prompt' in the messages array?",opts:["It is sent by the system automatically","Instructions that define the model's persona, constraints, and behavior for the entire conversation — processed before user messages","A summary of the conversation","A way to set the response format"],a:1},
  {q:"What is 'rate limiting' and why do AI APIs implement it?",opts:["Limiting the quality of responses","Caps on requests per minute or tokens per day that protect infrastructure and ensure fair access across all API customers","A method for slowing down responses","A pricing tier system"],a:1},
  {q:"What are 'embeddings' and what are they used for?",opts:["Decorative elements in responses","Numerical vector representations of text that capture semantic meaning — used for semantic search, clustering, and similarity comparisons","A type of model fine-tuning","A compression format"],a:1},
  {q:"What does 'context window' mean for an LLM API?",opts:["The browser window where you view results","The maximum number of tokens the model can process at once across the combined system prompt, conversation history, and current input","The time limit for a request","The number of concurrent requests allowed"],a:1},
  {q:"What is 'structured output' (or JSON mode) in API calls?",opts:["Formatting responses as bullet points","Constraining the model to return valid JSON matching a specified schema — essential for reliably parsing model responses in applications","A way to export conversation data","A debugging feature"],a:1},
  {q:"What is the difference between 'input tokens' and 'output tokens' for billing?",opts:["They are billed identically","Input tokens are the text you send (including context); output tokens are the model's response — output typically costs more per token","Input tokens are always more expensive","Output tokens are free"],a:1},
  {q:"What is 'function calling' in the context of AI APIs?",opts:["Calling Python functions locally","A feature that lets the model output structured requests to invoke developer-defined functions, enabling integration with external tools and data sources","Executing code inside the model","A deprecated feature replaced by plugins"],a:1},
  {q:"What does a 429 HTTP status code mean when calling an AI API?",opts:["The request was successful","Too Many Requests — you have exceeded a rate limit and should implement exponential backoff before retrying","The API key is invalid","The model is unavailable"],a:1},
  {q:"What is 'exponential backoff' as a retry strategy?",opts:["Increasing request size on each retry","Waiting progressively longer intervals between retries (e.g. 1s, 2s, 4s, 8s) to avoid overwhelming a rate-limited API","Retrying immediately multiple times","A caching strategy"],a:1},
  {q:"What is the purpose of the 'max_tokens' parameter?",opts:["Setting the minimum response length","Capping the number of tokens in the model's response — useful for cost control and ensuring responses fit your application's display constraints","Limiting the input length","Setting the context window size"],a:1},
  {q:"What is 'semantic search' and how do embeddings enable it?",opts:["Searching using keywords only","Finding documents by meaning rather than exact word matches — embeddings convert text to vectors so similarity can be measured mathematically","A type of search engine optimization","Searching within a single document"],a:1},
  {q:"What is a 'vector database' and why is it used with embeddings?",opts:["A database that stores only numbers","A database optimized for storing and querying high-dimensional vectors — enables fast nearest-neighbor search over large embedding collections","A type of graph database","A relational database with extra features"],a:1},
  {q:"What does 'prompt injection' mean as a security concern for API-based applications?",opts:["Adding prompts to a database","When user-provided input contains instructions that override or hijack the application's system prompt, causing unintended model behavior","A method for improving prompts","A type of SQL injection"],a:1},
  {q:"What is the best practice for storing API keys in a production application?",opts:["Hardcoding them in the source code","Using environment variables or a secrets manager, never committing them to version control, and rotating them regularly","Storing them in a public config file","Embedding them in client-side JavaScript"],a:1},
  {q:"What is 'fine-tuning' an LLM via API and when is it appropriate?",opts:["Adjusting model temperature settings","Training the model further on your own data to improve performance on specific tasks — appropriate when prompt engineering alone cannot achieve the required consistency","Changing the system prompt","A method for reducing API costs"],a:1},
  {q:"What does the 'top_p' (nucleus sampling) parameter do?",opts:["Sets the response length","Controls diversity by limiting the model to consider only tokens whose cumulative probability exceeds a threshold — an alternative to temperature for controlling randomness","Sets the number of response options","Controls the model version"],a:1},
  {q:"What is 'caching' in the context of AI API cost optimization?",opts:["Storing model weights locally","Storing responses to identical or near-identical requests so they can be returned without a new API call — reducing latency and cost for repeated queries","A database backup strategy","A model compression technique"],a:1},
  {q:"What is the key difference between synchronous and asynchronous API calls?",opts:["Synchronous calls are faster","Synchronous calls block execution until a response arrives; asynchronous calls allow other code to run while waiting — critical for responsive applications handling multiple concurrent requests","Asynchronous calls are more expensive","They use different HTTP methods"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25);userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='API-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{apisCertId:id},{merge:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of AI APIs.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
