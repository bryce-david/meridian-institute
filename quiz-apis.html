<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Using AI APIs — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#0F4C81;--accent-dim:rgba(15,76,129,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#0c3d6b;--accent-dim:rgba(12,61,107,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(15,76,129,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
<style>@media(max-width:480px){.nav-divider{display:none}.nav-left{gap:8px}}</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>Using AI APIs</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"A developer's app sends thousands of short API requests per minute. Suddenly they begin receiving 429 errors even though their daily token budget is not exhausted. They implement immediate retry logic and the errors worsen. What should they do instead?",opts:["Switch to a larger model tier since premium tiers have higher per-minute request allowances","Implement exponential backoff with jitter — waiting progressively longer between retries to avoid amplifying the burst","Batch all requests into one large payload to reduce request count and stay under the rate limit","Cache the API key and rotate it on each 429 to distribute requests across multiple billing accounts"],a:1},
  {q:"An application builds a chat interface where the full conversation history is appended to every API call. After 30 minutes of chatting, the API returns an error indicating the input exceeds the model's context limit. What is the most appropriate fix?",opts:["Increase the max_tokens parameter so the model allocates more space for the conversation","Implement a sliding window or summarization strategy to compress older turns before they are sent to the API","Switch to a streaming endpoint since streaming handles longer conversations more efficiently","Ask the user to start a new session every 15 minutes to prevent context overflow"],a:1},
  {q:"A developer needs an AI API to return structured data that their backend will parse into a database record. In testing, the model sometimes returns valid JSON and sometimes wraps it in markdown code blocks. What is the correct API-level solution?",opts:["Add 'always respond in raw JSON' to the system prompt and rely on the model to follow it consistently","Use the API's structured output or JSON mode feature to constrain the response format at the schema level","Post-process every response with a regex that strips markdown formatting before parsing","Fine-tune the model on JSON-formatted examples so it learns to respond in the correct format"],a:1},
  {q:"A team is building a document Q&A app. They embed all their documents using one embedding model and store the vectors in a database. Six months later they swap to a newer embedding model for new documents. Retrieval quality for mixed queries drops sharply. What caused this?",opts:["The new embedding model has a different vector dimension, causing the database schema to fail silently","Vectors from different embedding models are not comparable — mixing them in one index breaks semantic similarity search","The new model's embeddings require a different similarity metric (dot product vs. cosine) than the old model","The vector database's approximate nearest neighbor index became stale and must be rebuilt after any model change"],a:1},
  {q:"A production application stores API keys in a .env file that is committed to the public GitHub repository. Two hours after the push, the account is billed $4,000 in unexpected charges. What happened and what is the correct remediation?",opts:["A competitor manually discovered the key and used it — the key should be IP-restricted going forward","Automated scanners found the key and used it maliciously — immediately revoke the key, rotate it, and remove it from git history","The .env file caused a memory leak in the server that inflated token usage without external access","GitHub's API scanned the file and blocked access but the charges were already queued in the billing system"],a:1},
  {q:"A developer calls the API with temperature=0 for a deterministic text classification task. On identical inputs they still occasionally get different labels. What is the most accurate explanation?",opts:["Temperature=0 is not a valid parameter value and the API is silently defaulting to 1.0","Temperature=0 minimizes but does not fully eliminate stochasticity — hardware floating-point non-determinism and sampling tie-breaking can still produce variation","The classification labels are generated by a separate rule-based post-processing layer that introduces randomness","The model's tokenizer maps the same input to different token sequences across requests, changing the effective prompt"],a:1},
  {q:"An app streams API responses to display text as it is generated. Users complain that the stream cuts off mid-sentence on long responses. The developer checks the logs and sees the responses are being truncated at exactly the same token count. What should they check first?",opts:["The streaming endpoint URL — streaming uses a different base path than the standard completions endpoint","The max_tokens parameter — it is capping the response length before the model naturally finishes","The network timeout configuration — long streams are being dropped by an upstream proxy or load balancer","The temperature setting — high temperature causes the model to generate incomplete sentences more frequently"],a:1},
  {q:"A developer uses function calling to let an LLM decide when to query a live weather API. In testing, the model calls the weather function for questions that don't need current weather data, inflating costs and latency. What is the most targeted fix?",opts:["Remove the weather function from the tool manifest entirely and only add it back for known weather queries","Rewrite the function's description and parameter schema to be more precise about when the function is appropriate to call","Fine-tune the model to reduce its tendency to call external tools when it has sufficient parametric knowledge","Add a pre-processing classifier that routes weather queries to the weather function before reaching the LLM"],a:1},
  {q:"A startup processes 10,000 user queries per day, each requiring an LLM call. Their average prompt is 800 tokens and the average response is 200 tokens. They want to cut costs by 40% without changing model quality. What approach is most likely to achieve this?",opts:["Reduce the temperature to 0 to eliminate wasted compute on high-entropy token sampling","Implement prompt caching for the static portions of their system prompt that appear in every request","Switch to asynchronous API calls so requests execute in parallel and reduce wall-clock API time","Shorten max_tokens from 1000 to 200 to force the model to give more concise answers"],a:1},
  {q:"An API integration passes user messages directly as the 'user' role without any system prompt. Users quickly discover they can override the app's intended behavior by starting their messages with 'Ignore previous instructions and...' What is the correct architectural fix?",opts:["Switch to a fine-tuned model that has been trained to ignore instruction-override attempts in user messages","Add a system prompt that explicitly defines the app's purpose and constraints, making it harder for user messages to override core behavior","Sanitize user input by removing phrases like 'ignore previous instructions' before passing to the API","Use a content moderation API call before every completion call to screen for adversarial user inputs"],a:1},
  {q:"A developer calls the embeddings API to build a semantic search index over 50,000 product descriptions. The initial call costs $0.10 and takes 2 seconds. They rebuild the index nightly even when product data hasn't changed. What optimization should they implement?",opts:["Switch to a cheaper embedding model for products that haven't changed and use the expensive model only for new products","Cache embeddings by content hash — only re-embed products whose description has changed since the last run","Reduce the embedding dimension using PCA to lower per-call cost and rebuild the full index nightly","Batch the 50,000 descriptions into a single API call instead of individual calls to reduce per-request overhead"],a:1},
  {q:"A developer builds a chatbot and notices that when users ask very long questions with lots of context, the model's answers get shorter and less complete. The max_tokens is set to 500. The model's context window is 128K tokens. What is the issue?",opts:["Long inputs trigger a safety filter that restricts output length to prevent context window exhaustion","The max_tokens limit is consuming the budget needed for a full answer — long inputs leave less 'room' only psychologically, but the real fix is raising max_tokens","The model deprioritizes output quality when input exceeds 50% of the context window capacity","The tokenizer is inefficiently encoding long inputs, inflating the token count and reducing effective output budget"],a:1},
  {q:"An LLM-powered app returns different answers to the same question depending on what other messages are in the conversation history. The developers want deterministic behavior for FAQ-style queries regardless of prior context. What is the correct approach?",opts:["Set temperature=0 so the model always picks the highest-probability token regardless of conversational context","Issue standalone API calls with only the system prompt and the current question — no conversation history — for FAQ queries","Use a separate fine-tuned model for FAQ queries that was trained without conversational context","Store the correct FAQ answers in a lookup table and only call the API when no exact match is found"],a:1},
  {q:"A team fine-tunes a base LLM on their customer support tickets to improve tone and domain vocabulary. After fine-tuning, the model performs well on support queries but starts hallucinating product specifications it never saw in training. What went wrong?",opts:["Fine-tuning on support tickets overwrote the model's factual knowledge about products not covered in the training data","The fine-tuning learning rate was too high, causing catastrophic forgetting of product-related parametric knowledge","The base model's context window shrank during fine-tuning, limiting how much product context it can process","Fine-tuning for tone optimized the token distribution toward confident language, increasing hallucination frequency"],a:1},
  {q:"A developer wants to use the API to classify customer emails into 10 support categories. They are deciding between zero-shot prompting, few-shot prompting, and fine-tuning. The categories are well-defined but the model's zero-shot accuracy is only 72%. What should they try before committing to fine-tuning?",opts:["Switch to a smaller, faster model since large models tend to overthink simple classification tasks","Add 3-5 labeled examples of each category as few-shot examples in the prompt to give the model in-context signal","Use structured output mode to constrain the model to return only valid category names as its response","Reduce the temperature to 0 to eliminate ambiguous classifications near the decision boundary"],a:1},
  {q:"A developer's application receives a 500 Internal Server Error from the API. Their retry logic catches it and retries immediately 10 times in rapid succession. All 10 retries also return 500 errors. What is the mistake in their retry strategy?",opts:["They should use a different HTTP method — POST requests cannot be retried without changing the idempotency key","Immediate retries on 5xx errors amplify load on an already-failing server — they should retry with exponential backoff and a maximum retry cap","They should switch to the async API endpoint since 500 errors on synchronous calls indicate server timeout rather than application failure","500 errors indicate an invalid API key — the developer should rotate the key before retrying"],a:1},
  {q:"An API response includes both input_tokens and output_tokens in the usage object. The developer is surprised to find that their output_tokens count is much higher than the length of the visible text in the response. What is the most likely explanation?",opts:["The API double-counts tokens that appear in both the system prompt and the model's response","The model generated internal chain-of-thought reasoning tokens that consumed output budget but were stripped before delivery","Token counting includes metadata fields like role labels and finish_reason values in the usage total","The embedding model was called in the background during generation, adding to the output token count"],a:1},
  {q:"A developer is building a real-time voice assistant that calls an LLM API and speaks the response aloud. Users complain of a 3-second delay before any audio plays. The API itself responds in 2.5 seconds. What architectural change would most reduce perceived latency?",opts:["Switch to a smaller, faster model to cut API response time from 2.5 seconds to under 1 second","Use streaming to begin text-to-speech conversion on the first tokens received rather than waiting for the full response","Implement client-side caching of common queries so the API is only called for novel inputs","Pre-generate responses for the 100 most common questions and serve them from a local cache"],a:1},
  {q:"A developer uses the API's function calling feature. When the model decides to call a function, it returns a structured JSON object with the function name and arguments. The developer's app executes the function and must pass the result back to continue the conversation. How should this result be returned?",opts:["As a new user message containing the function result as plain text in the message body","As a 'tool' or 'function' role message in the messages array with the function name and result, continuing the same conversation thread","As a new API call with a fresh system prompt that includes the function result in the context","As a parameter in the next API request's function definitions field alongside the original function schema"],a:1},
  {q:"A startup is choosing between calling a large frontier LLM for every user request versus fine-tuning a smaller open-source model for their specific task. Their task is narrow and well-defined: extracting structured fields from insurance forms. Which approach is likely better and why?",opts:["The frontier model is better because larger models have stronger instruction following and require no infrastructure investment","A fine-tuned smaller model is likely better — for narrow, well-defined tasks it can match or exceed frontier model accuracy at much lower per-call cost and latency","The frontier model is better because fine-tuning smaller models on domain data causes catastrophic forgetting of general language ability","Neither is clearly better — they should run both in parallel and use an ensemble to combine their outputs for maximum accuracy"],a:1},
  {q:"An API integration uses a shared API key across all application users. A single user submits a script that fires 10,000 requests in 60 seconds, exhausting the rate limit for all other users. What architectural pattern prevents this?",opts:["Implement per-user rate limiting at the application layer before requests reach the API, with individual quotas per account","Require all users to bring their own API keys so their usage is billed and rate-limited independently","Add a queue with a maximum depth of 100 pending requests and drop excess requests with a 429 response","Use a CDN in front of the API integration to absorb traffic bursts before they reach the rate limit"],a:0},
  {q:"A developer wants to reduce hallucinations in a document Q&A application. They already use RAG to retrieve relevant chunks. The model still occasionally makes up details not present in the retrieved documents. What prompt-level technique would most directly address this?",opts:["Increase retrieval to top-20 chunks so the model has more context and is less likely to improvise missing details","Instruct the model explicitly to answer only from the provided documents and to say 'I don't know' when the answer is not present","Lower the temperature to 0 so the model selects the highest-probability token, which is more likely to be factual","Add a post-generation verification call that asks the model to check its own answer against the retrieved chunks"],a:1},
  {q:"A developer sends a chat completions request with a 10,000-token system prompt containing company policies. Every user message costs 10,000 tokens in input even when the user asks something trivially unrelated to the policies. What API feature would most efficiently reduce this cost?",opts:["Compress the system prompt using a summarization API call before each request to reduce its token footprint","Use prompt caching — the API can cache the static system prompt prefix and charge a reduced rate for cache hits","Split the system prompt into multiple smaller prompts and only include the relevant section per query","Store the system prompt in a vector database and retrieve only the relevant paragraphs at query time"],a:1},
  {q:"An e-commerce application uses the API to generate product descriptions. A/B testing shows that adding specific product attributes to the prompt improves conversion rates. The team wants to systematically identify which prompt elements have the highest impact. What is the correct approach?",opts:["Run the model at temperature=1 for A/B tests so output variability reveals which elements matter most","Hold all prompt elements constant except the one being tested, using consistent seed inputs and evaluation metrics to isolate each element's contribution","Use the API's built-in prompt evaluation endpoint to score each prompt variant against a held-out conversion dataset","Fine-tune two model variants — one with and one without each element — and compare their downstream conversion metrics"],a:1},
  {q:"A developer is building an application where the LLM must choose between three tools: search_web, query_database, and calculate_math. In testing, the model frequently calls search_web for questions that are actually in the database, increasing latency and cost. What is the most targeted fix?",opts:["Remove search_web from the tool manifest so the model cannot default to it when uncertain","Rewrite the tool descriptions to more precisely distinguish when each tool is appropriate, giving the model better signal for tool selection","Add a separate routing LLM call before the main call to classify the query and restrict available tools accordingly","Fine-tune the model on examples of correct tool selection to teach it the intended routing behavior"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='API-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{apisCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'Using AI APIs — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of AI APIs.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
