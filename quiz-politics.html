<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-48.png" sizes="48x48" type="image/png">
<link rel="apple-touch-icon" href="/favicon-48.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — AI in Politics — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#9D174D;--accent-dim:rgba(157,23,77,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#881337;--accent-dim:rgba(136,19,55,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(157,23,77,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
<style>@media(max-width:480px){.nav-divider{display:none}.nav-left{gap:8px}}</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>AI in Politics</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"A campaign uses AI to identify which voters in a swing district are most persuadable on healthcare. What capability makes this possible?",opts:["Predictive modeling","Mass broadcast advertising","Random sampling","Voter registration lists"],a:0},
  {q:"What distinguishes a synthetic deepfake from a traditionally edited video in terms of its threat to democratic discourse?",opts:["Deepfakes load faster on mobile devices, making them more widely shareable before fact-checking can occur","A synthetic deepfake can fabricate events or statements that never happened with photorealistic quality, defeating the instinct that 'seeing is believing'","Traditional edited video cannot be authenticated while deepfakes carry embedded authenticity watermarks","Deepfakes are easier to detect because they always show subtle artifacts that trained fact-checkers can identify"],a:1},
  {q:"What is 'micro-targeting' in political campaigns and why does it raise democratic concerns?","opts":["Targeting small geographic precincts rather than statewide media markets to reduce advertising costs","Using individual-level data to send different messages to different voters in ways that are invisible to the public and resistant to collective scrutiny","Targeting the smallest possible number of persuadable voters to maximize efficiency of campaign spending","A targeting technique that is illegal under Federal Election Commission regulations in the United States"],a:1},
  {q:"How do engagement-optimizing social media algorithms relate to political polarization?",opts:["They actively censor political content, reducing the amount of political information users encounter","By optimizing for engagement, they disproportionately amplify outrage-inducing and extreme content that drives more clicks and shares","They suppress political content in favor of entertainment to avoid regulatory scrutiny from election commissions","They create equal exposure to all political viewpoints by distributing content randomly across the user base"],a:1},
  {q:"What is a 'filter bubble' and how does it form through algorithmic processes?",opts:["A technical spam filter that blocks political emails from unknown campaign organizations","An information environment where users are algorithmically shown primarily content that confirms existing beliefs, reducing exposure to contrary views","A regulatory tool that filters political advertising during blackout periods before elections","A feature that prevents misinformation from reaching vulnerable users by filtering unreliable sources"],a:1},
  {q:"A foreign government uses AI to generate thousands of social media accounts posting divisive domestic political content. What is this called?",opts:["Domestic disinformation","An information operation or influence operation — coordinated inauthentic behavior using AI to manipulate public opinion","Legal political speech since the accounts were created by a government actor","Computational journalism, which is a recognized and legitimate form of political communication"],a:1},
  {q:"What is 'computational propaganda' as distinct from traditional political advertising?",opts:["Political advertising that uses sophisticated computer graphics to create more visually compelling content","The use of algorithms, automation, and big data to distribute tailored political messages at scale — often disguised as organic discourse","Propaganda created by government-funded research institutions using academic computational methods","Political messaging that targets computer scientists and technology workers specifically as an audience"],a:1},
  {q:"Why is AI-assisted legislative drafting potentially valuable for under-resourced legislators?",opts:["AI can formally introduce legislation on behalf of a legislator who lacks access to the chamber floor","AI can rapidly analyze existing statute, flag conflicts with proposed language, and draft initial text — tasks that currently require expensive legal staff or lobbyist assistance","AI can vote on behalf of a legislator when they are unable to be present for a floor vote","Under-resourced legislators are not permitted to use AI tools under current congressional ethics rules"],a:1},
  {q:"What is 'social scoring' and why does the EU AI Act prohibit it?",opts:["The practice of rating social media platforms on their content moderation policies","Government systems that rate citizens based on behavior across contexts and use scores to deny access to services or opportunities — a fundamental threat to dignity and equality","A commercial credit scoring system that incorporates social media data alongside traditional financial indicators","An opt-in civic engagement platform that rewards community volunteering with access to government services"],a:1},
  {q:"A journalist asks an AI to summarize a politician's voting record. The AI confidently states a vote the politician never cast. What is the core problem here?",opts:["The AI used proprietary political data that it is not licensed to access for this type of query","AI may hallucinate political records with the same confidence it states accurate ones — requiring verification against official vote records before publication","The AI's training data does not include any congressional voting data, so all outputs in this domain are invented","AI tools are prohibited from commenting on the voting records of current officeholders under campaign finance law"],a:1},
  {q:"What is 'election security' in the context of AI threats?","opts":["Ensuring that AI-assisted campaign fundraising platforms are compliant with FEC reporting requirements","Protecting voting systems, voter registration databases, and the information environment from AI-assisted interference, manipulation, and disinformation","The legal framework governing which AI tools candidates are permitted to use during a campaign","Cybersecurity standards for the electronic devices that elected officials use in their official capacity"],a:1},
  {q:"How does AI surveillance technology threaten political assembly and free expression?",opts:["By slowing internet speeds in areas where protests are occurring, making organizing more difficult","By enabling the identification and tracking of individuals attending protests or political meetings, creating a chilling effect on participation","By generating fake footage of protests that discredits legitimate political demonstrations","By blocking social media access in geographic areas where political demonstrations are underway"],a:1},
  {q:"What is the 'US-China AI competition' most fundamentally about at the strategic level?",opts:["Competition over the largest number of AI research papers published each year in peer-reviewed journals","Technological and economic supremacy — whoever leads in AI development may gain decisive advantages in economic productivity, military capability, and geopolitical influence","A bilateral trade dispute over the export of AI software and digital services between the two countries","Competition to set global standards for AI safety and ethics, where each country advocates for a different framework"],a:1},
  {q:"Why is AI-enabled facial recognition at a political demonstration different from traditional surveillance?","opts":["Facial recognition at protests is more accurate than traditional surveillance and produces fewer misidentifications","It enables retroactive identification of all attendees from recorded footage at scale — meaning participation can be identified and potentially used to retaliate long after an event ends","Traditional surveillance already accomplished the same identification goals before AI-enabled facial recognition existed","Facial recognition at political events is exclusively operated by independent nonprofit organizations with no government access"],a:1},
  {q:"What is the 'revolving door' problem and why does it matter for AI governance?",opts:["When AI systems are turned on and off repeatedly during testing, creating instability in safety evaluations","When officials who regulate AI companies take industry jobs after leaving government — potentially weakening oversight in exchange for future employment","When AI companies hire from academia, removing researchers from public-interest research into private commercial work","When AI governance rules change with each new administration, creating regulatory uncertainty for industry planning"],a:1},
  {q:"AI enables 'astroturfing' at scale. What is astroturfing?",opts:["A landscaping automation technology that has been repurposed for political campaign work","Creating the false impression of grassroots citizen support using fake accounts, manufactured testimonials, or coordinated inauthentic campaigns","A lobbying technique where multiple industry groups file identical regulatory comments to signal broad opposition","A social media strategy where campaigns pay real supporters to share content in exchange for merchandise or access"],a:1},
  {q:"How might AI reshape lobbying and political influence operations?",opts:["AI will make lobbying more transparent by automatically disclosing every communication between lobbyists and legislators","AI enables hyper-targeted influence campaigns, rapid generation of tailored policy arguments, and automated contact with legislators — concentrating influence among well-resourced groups","AI has made professional lobbyists unnecessary since all their functions can now be performed by general AI assistants","AI primarily benefits small advocacy organizations since large firms already had sufficient staff to handle lobbying activities"],a:1},
  {q:"What is the democratic accountability problem with AI-automated government decision-making?","opts":["AI systems make government decisions too slowly, reducing the efficiency of public service delivery","When AI makes or heavily influences decisions affecting citizens' rights, it may become unclear who is responsible and harder for citizens to seek redress","AI automated decisions are always more accurate than human decisions, so accountability concerns are theoretically irrelevant","Automated government decisions are easier to appeal than human decisions because AI always generates a decision audit trail"],a:1},
  {q:"Which of the following best describes a legitimate use of AI in democratic governance?",opts:["Using AI to automatically override legislative votes that the AI determines are contrary to evidence-based policy","Using AI to help public agencies process citizen feedback at scale, identify service delivery gaps, and make government information more accessible","Using AI to select the most 'rational' policy option and implement it without going through the legislative process","Using AI to monitor elected officials' private communications to detect corruption before it becomes public"],a:1},
  {q:"What is the 'surveillance capitalism' business model and how does it relate to political AI?","opts":["A model in which governments sell surveillance technology to private companies as a revenue source","A business model based on extracting behavioral data at scale to predict and influence behavior — providing the data infrastructure that political micro-targeting and manipulation depends upon","A type of military-industrial complex in which defense contractors use surveillance profits to fund AI weapons development","A regulatory framework in which companies must purchase licenses to conduct customer behavioral analysis"],a:1},
  {q:"Why do researchers consider AI-powered disinformation potentially more dangerous than traditional disinformation?","opts":["Traditional disinformation required large organizations to produce, while AI disinformation requires smaller teams — only reducing scale and reach","AI enables the mass production of varied, personalized, and contextually plausible false content that is harder to identify as coordinated and faster to spread than traditional disinformation","Traditional disinformation was always fact-checked before reaching a large audience, while AI disinformation bypasses all editorial review","AI disinformation only affects social media users while traditional disinformation also reaches voters who do not use social media"],a:1},
  {q:"What is 'algorithmic accountability' and why is it difficult to achieve for platform recommendation systems?",opts:["The legal requirement for platforms to report their algorithm changes to the FEC before each election cycle","The principle that those who design and deploy algorithmic systems should be answerable for their effects — difficult because recommendation algorithms are opaque, proprietary, and their societal effects are causally complex to establish","The technical process by which AI systems self-audit their own recommendations and report on accuracy","A corporate governance requirement that algorithm engineers report directly to the board rather than to product leadership"],a:1},
  {q:"How can AI be used as a tool to support — rather than undermine — democratic participation?",opts:["By automating voter registration removal for citizens who have not voted in recent elections","By making government information more accessible, enabling large-scale analysis of public comment data, and helping legislators understand the range of constituent views on complex policy questions","By determining which political candidates are most qualified and recommending them to voters based on their issue preferences","By replacing human election administrators with AI systems to eliminate the potential for human bias or error in election administration"],a:1},
  {q:"What is the 'chilling effect' in the context of AI surveillance and democratic rights?",opts:["A technical term for when AI data centers overcool their servers, increasing energy consumption","When awareness of surveillance causes people to self-censor political speech, avoid association with certain groups, or refrain from attending demonstrations — reducing political participation below what it would otherwise be","A legal doctrine preventing law enforcement from using AI-gathered evidence in political prosecution cases","The regulatory effect of over-aggressive AI governance that slows beneficial AI innovation"],a:1},
  {q:"What principle should guide the use of AI in democratic governance according to the course?",opts:["Maximize decision-making speed above all other considerations since faster government is more responsive government","Human oversight, transparency, and democratic accountability — AI should augment democratic processes while remaining under meaningful human and institutional control","Deploy the most advanced AI available since more powerful AI produces better policy outcomes","Minimize cost by replacing human government workers with AI wherever technically feasible to redirect savings to citizen services"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25);userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='POL-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{politicsCertId:id},{merge:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of AI in Politics.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
