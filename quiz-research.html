window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

// 25 questions covering all 10 modules (~2-3 per module)
// Modules 1-2: AI as Research Partner, Literature Discovery
// Modules 3-4: Research Writing, Data Analysis
// Modules 5-6: Hypothesis Generation, Peer Review & Integrity
// Modules 7-8: Citation Management, Communicating Research
// Modules 9-10: Collaborative Research, Future of AI-Augmented Science

const ALL_QUESTIONS=[
  // MODULE 1 — AI as a Research Partner
  {q:"A researcher uses an AI assistant to help design a study on a topic outside their specialty. The AI produces a detailed, confident-sounding protocol that includes a specific statistical power calculation. What is the most important limitation to recognize about this output?",opts:["AI statistical calculations are always run on synthetic data and cannot apply to real-world samples","The AI may have generated a plausible protocol without genuine understanding of the domain — the power calculation and design assumptions must be verified by a domain expert before the study proceeds","AI-generated protocols are only valid for qualitative research and should not be used for quantitative study design","Statistical calculations produced by AI are less accurate than those produced by standard software packages like G*Power"],a:1},
  {q:"What distinguishes 'retrieval-augmented generation' (RAG) from standard language model responses in a research context?",opts:["RAG generates multiple candidate answers and presents them simultaneously for the researcher to choose between","RAG retrieves specific documents from a defined knowledge base and grounds the AI's response in those documents, reducing hallucination risk compared to relying on parametric memory alone","RAG is a method for training AI models on domain-specific research corpora to improve their terminology accuracy","RAG automatically formats AI outputs in standard academic citation styles, making them immediately usable in manuscripts"],a:1},
  // MODULE 2 — Literature Discovery and Synthesis
  {q:"A researcher asks an AI to generate a list of key papers on a topic and receives 20 citations with titles, authors, and DOIs. Before citing any of them, what is the single most critical verification step?",opts:["Confirming that the papers all fall within the last five years to ensure the review reflects current scholarship","Checking each paper against an authoritative database to verify that the citations actually exist — AI can generate entirely fabricated but plausible-sounding references","Running each DOI through a plagiarism detector to confirm the papers have not been retracted","Verifying that the cited papers were published in journals with impact factors above a threshold relevant to the field"],a:1},
  {q:"Tools like Elicit and Semantic Scholar differ from general AI chatbots for literature discovery primarily because they:",opts:["Use larger training datasets and therefore produce more accurate summaries of any academic topic","Return actual papers from verified academic databases with real metadata, rather than generating descriptions of papers from parametric memory","Are trained exclusively on scientific literature and therefore never produce errors in domain-specific summaries","Automatically generate and submit literature review sections to journals, reducing the researcher's writing workload"],a:1},
  // MODULE 3 — Research Writing with AI
  {q:"A researcher provides an AI with their dataset and the following prompt: 'Write the Results section of my paper.' The AI produces a well-organized section that accurately describes the data. What is the primary problem with using this output directly?",opts:["AI-generated Results sections are always too brief and fail to include sufficient statistical detail for peer review","The results were described from the data provided, but the interpretation, emphasis, and framing reflect the AI's default patterns — the researcher must own these decisions to ensure the section accurately represents their scientific judgment","AI is not permitted to access raw datasets under most institutional data governance policies, so the output cannot have been generated legitimately","The output will contain citation hallucinations that misattribute statistical methods to incorrect sources"],a:1},
  {q:"What is 'grounding' in the context of prompting an AI to help write a literature review section?",opts:["Ensuring the AI adopts a formal academic tone by specifying the target journal's style guide in the system prompt","Supplying the AI with the actual source texts, papers, or quotes it should draw on — so that the output is anchored to real evidence rather than to the AI's parametric memory of the field","Setting the model's temperature to zero to make the output fully deterministic and reproducible","Instructing the AI to limit its vocabulary to terms that appear in standard discipline-specific glossaries"],a:1},
  // MODULE 4 — Data Analysis and Visualization
  {q:"A researcher uses AI to generate Python code for a mixed-effects model, runs it without errors, and includes the output in their paper. What is the most significant risk they have not addressed?",opts:["Python is not an accepted programming language in most quantitative social science journals, which require SPSS or Stata","The code may be syntactically correct but analytically wrong — AI can generate plausible statistical code that misspecifies the model, uses an inappropriate estimator, or mishandles random effects in ways that produce incorrect results without errors","AI-generated code cannot reproduce exact results across different operating systems, making the analysis irreproducible by other researchers","The output will lack sufficient decimal precision for statistical reporting in peer-reviewed contexts"],a:1},
  {q:"When using AI to assist with qualitative data analysis, what is the most important human role that should not be delegated to the AI?",opts:["Transcribing and formatting interview transcripts so that they are ready for systematic analysis","Interpreting the meaning of emerging codes, adjudicating when data excerpts fit a category boundary case, and grounding analytical decisions in deep familiarity with the research context","Counting word frequencies and producing preliminary descriptive statistics about the most common terms","Formatting the final codebook and thematic summary in the style required by the target journal"],a:1},
  // MODULE 5 — Hypothesis Generation
  {q:"A research team uses an AI to generate 20 candidate hypotheses from a literature synthesis, then selects three to test. Which of the following best describes the epistemic status of this workflow?",opts:["AI-generated hypotheses carry the same epistemic weight as hypotheses derived through traditional theoretical reasoning because both emerge from existing literature","The hypotheses are starting points that must be evaluated by domain experts for novelty, testability, and fit with existing theory before committing research resources — the AI generates candidates, not conclusions","This workflow is methodologically invalid because generating hypotheses after reviewing the literature constitutes HARKing","AI hypothesis generation is only appropriate in fields where the hypotheses can be tested using automated experimental systems without human experimental design"],a:1},
  {q:"What does it mean to ask an AI to 'steelman' a hypothesis you find implausible, and why is this a useful research technique?",opts:["It means having the AI rewrite the hypothesis using stronger quantitative language to make it more publishable","It means prompting the AI to construct the most compelling possible argument in favor of the hypothesis — surfacing evidence and mechanisms you may have dismissed — which guards against premature closure on the hypothesis space","It means asking the AI to identify which prior papers support the hypothesis so you can cite them in your literature review","It means having the AI generate a formal logical proof of the hypothesis using symbolic reasoning rather than inductive reasoning from data"],a:1},
  // MODULE 6 — Peer Review and Integrity
  {q:"A journal editor uses AI to screen submissions for statistical reporting errors before sending them to reviewers. A paper that passes the AI screen is sent for peer review. What should reviewers understand about this system?",opts:["AI screening has replaced the need for reviewers to check statistical reporting in detail, so reviewer attention can shift entirely to theoretical contribution","AI screening catches known error patterns in statistical reporting but cannot assess whether the statistical approach is appropriate for the research question, whether assumptions are met, or whether the conclusions are warranted by the results","Papers that pass AI statistical screening are certified as methodologically sound and can be accepted with minimal further review","AI screening is most reliable for papers using standard regression approaches and is unreliable for any analysis involving machine learning or Bayesian methods"],a:1},
  {q:"Which of the following best describes the current emerging consensus on disclosing AI use in peer-reviewed research?",opts:["AI use need only be disclosed if the AI generated text that appears verbatim in the final manuscript — editing and paraphrasing AI outputs does not require disclosure","AI tools should be disclosed in the methods or acknowledgments section with sufficient specificity for reproducibility, including which tools were used and for what purposes — the researcher retains full responsibility for all claims regardless of AI involvement","AI use in data analysis must be disclosed, but AI use in writing assistance is considered equivalent to grammar software and does not require disclosure","Only AI use that occurred during the experiment itself requires disclosure — AI used during writing or analysis after data collection is not subject to disclosure norms"],a:1},
  // MODULE 7 — Citation Management
  {q:"A researcher uses Zotero's browser clipper to save papers and then uses an AI tool to generate summaries of each saved paper for their literature review. What is the critical difference between this workflow and asking an AI to generate citations from scratch?",opts:["The browser clipper approach is slower and produces lower-quality summaries than asking the AI to generate citations directly from the research question","In the browser clipper workflow, the papers being summarized actually exist and were selected by the researcher — the AI is summarizing real documents the researcher has verified, rather than generating plausible-sounding citations that may be fabricated","Zotero's summaries are generated by a different AI system that is specialized for academic literature and therefore more accurate than general-purpose AI tools","The browser clipper approach requires the researcher to read every paper in full before AI summarization, which defeats the efficiency advantage of AI assistance"],a:1},
  {q:"What is a 'living systematic review' and how does AI most usefully support it compared to a one-time systematic review?",opts:["A living systematic review focuses on biological organisms and benefits from AI's ability to identify taxonomic classifications automatically","A living systematic review is continuously updated as new evidence emerges — AI can monitor relevant databases for new papers matching the review's inclusion criteria and flag them for human evaluation, reducing the labor of maintaining currency over time","A living systematic review is identical to a standard systematic review but is published online rather than in print, where AI assists with formatting and web publication","A living systematic review is conducted in real time during a research conference, where AI synthesizes presentations as they occur and adds them to the review record"],a:1},
  // MODULE 8 — Communicating Research
  {q:"A researcher is writing a response to a reviewer who requests an additional analysis that would require collecting new data the team does not have. Which AI-assisted approach is most appropriate?",opts:["Ask the AI to generate a response that gently declines the reviewer's request without explaining why, to avoid giving the reviewer grounds to reject the paper","Provide the AI with your reasoning for why the additional analysis is not feasible, and ask it to help frame a response that acknowledges the reviewer's point has scientific merit, explains the limitation clearly, and defends the validity of the existing analysis","Use AI to generate a simulated version of the requested analysis using synthetic data, which can satisfy the reviewer's concern while noting the data limitations in a footnote","Ask the AI to identify a precedent paper that declined a similar reviewer request, and cite that precedent as grounds for rejecting the reviewer's request without substantive engagement"],a:1},
  {q:"A researcher wants to communicate a technical finding to a general newspaper audience. Which AI prompt pattern is most likely to produce an accurate and accessible result?",opts:["Ask the AI to write the explainer directly without providing domain context, since the AI's general knowledge is sufficient and researcher input introduces technical bias","Describe the research in technical terms, specify the target audience, ask the AI to generate the explainer, and then review it carefully for scientific accuracy — the AI may introduce vivid but technically misleading analogies that require correction","Ask the AI to identify the three most commonly used analogies for this type of research in past science journalism, and use those analogies directly without modification","Provide the AI with the published paper and ask it to shorten the abstract to 250 words, since abstracts are already written for a broad scientific audience"],a:1},
  {q:"What is the specific structural function of the Specific Aims page in an NIH grant application, and what role should AI play in developing it?",opts:["The Specific Aims page is a technical appendix summarizing the experimental design — AI can generate it directly from the Research Strategy section with minimal researcher review","The Specific Aims page establishes significance, identifies the gap, and articulates the hypothesis and aims in one page — it is the reviewer's first and often most influential impression. AI is most useful for editing and structural critique of drafts the researcher has written, not for generating the core content","The Specific Aims page primarily functions to satisfy administrative requirements and has little effect on reviewer scores — AI's role is to ensure it meets the formatting requirements specified in the funding announcement","The Specific Aims page is evaluated by program officers rather than peer reviewers, so AI communication-style improvements are more important than scientific content in this section"],a:1},
  // MODULE 9 — Collaborative Research
  {q:"A research team has members with widely different levels of AI fluency. Some team members routinely verify AI outputs; others share AI-generated content directly without checking. What is the most effective team-level intervention?",opts:["Restrict AI tool access to team members who have passed a formal AI proficiency test, preventing less experienced members from using AI until they are certified","Establish explicit team norms requiring all AI-generated content shared as input to team decisions to be labeled as AI-assisted and reviewed by the person sharing it — this makes verification a shared expectation independent of individual skill levels","Designate one AI-fluent team member to handle all AI interactions for the team, preventing less experienced members from using AI tools independently","Purchase institutional AI tools with built-in verification features that automatically flag hallucinations, removing the need for individual team members to verify outputs themselves"],a:1},
  {q:"In a large international research collaboration, two team members used different AI tools to generate summaries of the same paper for a shared literature database, and their summaries contradict each other on a key finding. What does this situation most directly illustrate?",opts:["International research collaborations should require all team members to use the same AI tool to ensure consistency, and the contradiction should be resolved by accepting the output of the more widely used tool","AI-generated summaries are interpretive artifacts that reflect both the tool's training and the prompt used — the contradiction should be resolved by reading the original paper, and the team should establish prompting conventions so that summaries generated by different members are comparable","One of the two team members made an error in prompting and should be required to regenerate their summary using the other member's exact prompt","The contradiction demonstrates that AI tools are insufficiently reliable for collaborative literature synthesis and the team should revert to manual summarization"],a:1},
  {q:"Why is maintaining a shared AI use log throughout a collaborative research project important, and what should it record?",opts:["An AI use log documents how much time was saved by using AI tools, which is required information for grant reporting to funding bodies that provided AI-related budget items","An AI use log records which AI tools were used, for what tasks, by which team members, and whether outputs were verified — it supports accurate disclosure at submission, creates accountability across team members, and provides the basis for reproducibility documentation","An AI use log is required by most institutional review boards to demonstrate that AI tools complied with data privacy regulations during the research process","An AI use log tracks the cost of AI tool subscriptions across the team, which is necessary for budget reconciliation and to comply with institutional procurement policies"],a:1},
  // MODULE 10 — Future of AI-Augmented Science
  {q:"AlphaFold's impact on structural biology is best described as which of the following, and what does it suggest about AI's role in science more broadly?",opts:["AlphaFold automated the experimental process of X-ray crystallography, eliminating the need for wet lab protein structure determination and suggesting AI will replace experimental biology","AlphaFold made a computationally intractable prediction problem tractable at scale, opening new experimental programs that weren't previously possible — suggesting AI's most transformative contributions will come in domains where a well-defined prediction task was the bottleneck, not in replacing the scientific judgment that acts on those predictions","AlphaFold demonstrated that AI can reason about biological mechanisms from first principles, suggesting AI will eventually replace theoretical biology by generating mechanistic explanations from training data alone","AlphaFold improved the speed of existing structure determination workflows by approximately 10-fold, representing an incremental productivity improvement rather than a qualitative change in what research is possible"],a:1},
  {q:"A researcher is concerned that using widely-adopted AI literature tools is causing their research group's hypothesis generation to converge with other groups using the same tools. Which response best addresses this concern?",opts:["The concern is unfounded because AI systems generate outputs stochastically, so different groups using the same tool will receive different hypothesis suggestions","The concern is legitimate — AI tools trained on existing literature will systematically surface mainstream hypotheses and underweight novelty. Researchers should deliberately prompt AI to argue for unpopular positions, identify prematurely dismissed approaches, and explore the tails of the hypothesis distribution rather than just using AI recommendations as a starting point","The concern applies only to groups in the same subfield — interdisciplinary groups using the same tools will not converge because they approach the literature from different starting points","The solution is to use AI tools from different providers, since different training datasets will produce sufficiently different hypotheses to maintain research diversity within the scientific community"],a:1},
  {q:"A paper describes an automated laboratory system that designed and ran experiments using Bayesian optimization, discovering new photovoltaic materials faster than human-directed experimentation. What does this case most directly demonstrate about AI's current capabilities in science?",opts:["AI systems can now independently conduct scientific research from hypothesis generation through experimental design to publication, replacing the need for human researchers in materials science","AI systems can efficiently navigate high-dimensional experimental search spaces using optimization strategies that outperform human intuition for specific well-defined tasks — but the task definition, scientific interpretation, and determination of what constitutes success still require human judgment","This case demonstrates that all experimental research in materials science should transition to automated laboratory platforms immediately to maximize discovery rates","Bayesian optimization by AI is equivalent to genuine scientific reasoning, meaning AI systems in this case were acting as genuine scientific contributors warranting authorship credit"],a:1},
  {q:"What does reproducibility mean for a research paper in which AI was used to assist with literature screening, data analysis code generation, and drafting the discussion section?",opts:["The paper is reproducible as long as the final manuscript is made open access, because other researchers can read the methods and replicate the study using their own tools","Reproducibility requires that the AI-assisted steps be documented with sufficient specificity — including which tools and versions were used, the exact prompts applied, and what verification steps were taken — so another researcher could assess the methods and, where feasible, replicate the AI-assisted steps under comparable conditions","AI-assisted research cannot be reproducible by definition, because AI outputs are stochastic and cannot be exactly replicated even with the same model and prompt","Reproducibility applies only to the experimental and statistical components of the paper — writing assistance from AI does not affect reproducibility and requires no documentation beyond standard manuscript acknowledgment"],a:1},
  {q:"Which combination of skills will most distinguish productive researchers in an AI-augmented scientific environment over the next decade, compared to the skills that distinguished researchers in the decade before AI tools were widely adopted?",opts:["Rapid reading speed and large working memory, which allow researchers to process more literature than AI tools can, remaining the most efficient way to develop broad domain knowledge","Deep domain expertise combined with the ability to critically evaluate AI outputs, specify what AI should do with precision, and interpret unexpected findings in ways that extend existing theory — because AI handles volume and pattern-matching, while human judgment on meaning, validity, and direction becomes the primary constraint","Proficiency with a broad range of AI tools and platforms, which allows researchers to stay current with the fastest-changing part of the research stack and apply the newest capabilities as they are released","Statistical fluency in the methods AI tools use internally, including transformer architecture and attention mechanisms, so that researchers can understand why AI produces specific outputs and debug errors at the model level"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){
  activeQuestions=ALL_QUESTIONS.map(q=>{
    const correct=q.opts[q.a];
    const s=shuffle([...q.opts]);
    return{...q,opts:s,a:s.indexOf(correct)};
  });
  userAnswers={};
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  renderQuestions();
};
function renderQuestions(){
  const c=document.getElementById('questions-container');
  c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');
}
window.selectOpt=function(qi,oi){
  userAnswers[qi]=oi;
  activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});
  const answered=Object.keys(userAnswers).length;
  document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';
  document.getElementById('submit-btn').disabled=answered<activeQuestions.length;
};
window.submitQuiz=async function(){
  let correct=0;
  activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});
  const pct=Math.round(correct/activeQuestions.length*100);
  const passed=pct>=70;
  if(passed&&currentUser){
    try{
      const id='RES-'+Date.now();
      await setDoc(doc(db,'users',currentUser.uid),{researchCertId:id},{merge:true});
      await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'AI for Research and Academia — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});
      document.getElementById('cert-id-text').textContent=id;
      document.getElementById('cert-box').style.display='block';
    }catch(e){}
  }
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-icon').textContent=passed?'🎓':'📖';
  document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';
  document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;
  document.getElementById('result-msg').textContent=passed?'Congratulations — you\'ve demonstrated expert-level understanding of AI for Research and Academia.':'You need 70% to pass. Review the modules and try again when you\'re ready.';
  if(!passed){document.getElementById('retry-btn').style.display='inline-block';}
  document.getElementById('result-screen').style.display='block';
};
window.retryQuiz=function(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('cert-box').style.display='none';
  document.getElementById('retry-btn').style.display='none';
  window.startQuiz();
};
</script>
</body>
