<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#064E3B;--accent-dim:rgba(6,78,59,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#053d2f;--accent-dim:rgba(5,61,47,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(6,78,59,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

// 25 questions covering all 10 modules (~2-3 per module)
// Modules 1-2: AI as Research Partner, Literature Discovery
// Modules 3-4: Research Writing, Data Analysis
// Modules 5-6: Hypothesis Generation, Peer Review & Integrity
// Modules 7-8: Citation Management, Communicating Research
// Modules 9-10: Collaborative Research, Future of AI-Augmented Science

const ALL_QUESTIONS=[
  {q:"A researcher uses AI to design a study outside their specialty. The AI produces a detailed, confident-sounding protocol with a specific power calculation. What is the most important limitation to recognize?",opts:["AI statistical calculations run on synthetic data and cannot apply to real-world samples","AI-generated protocols are only valid for qualitative research","Statistical calculations produced by AI are less accurate than those produced by standard software like G*Power","The AI may have generated a plausible protocol without genuine understanding of the domain — the power calculation and design assumptions must be verified by a domain expert before the study proceeds"],a:3},
  {q:"What distinguishes RAG from standard language model responses in a research context?",opts:["RAG generates multiple candidate answers simultaneously for the researcher to choose between","RAG automatically formats outputs in standard academic citation styles, making them immediately usable in manuscripts","RAG retrieves specific documents from a defined knowledge base and grounds the AI's response in those documents, reducing hallucination risk compared to relying on parametric memory","RAG is a method for training AI models on domain-specific corpora to improve their terminology accuracy"],a:2},
  {q:"A researcher asks an AI to generate 20 citations and receives titles, authors, and DOIs. Before citing any, what is the single most critical verification step?",opts:["Confirming all papers fall within the last five years to ensure currency","Verifying that the cited papers were published in journals with impact factors above a field-relevant threshold","Running each DOI through a plagiarism detector to confirm the papers have not been retracted","Checking each paper against an authoritative database to verify that the citations actually exist — AI can generate entirely fabricated but plausible-sounding references"],a:3},
  {q:"Tools like Elicit and Semantic Scholar differ from general AI chatbots for literature discovery primarily because they:",opts:["Use larger training datasets and produce more accurate summaries of any academic topic","Are trained exclusively on scientific literature and therefore never produce errors in domain-specific summaries","Automatically generate and submit literature review sections to journals","Return actual papers from verified academic databases with real metadata, rather than generating descriptions of papers from parametric memory"],a:3},
  {q:"A researcher provides their dataset and prompts AI: 'Write the Results section of my paper.' The AI produces a well-organized section that accurately describes the data. What is the primary problem with using this output directly?",opts:["AI-generated Results sections are always too brief for peer review","AI cannot access raw datasets under most institutional data governance policies, so the output cannot have been generated legitimately","The output will contain citation hallucinations misattributing statistical methods to incorrect sources","The results were described from the data provided, but interpretation, emphasis, and framing reflect AI's default patterns — the researcher must own these decisions to ensure the section accurately represents their scientific judgment"],a:3},
  {q:"What is 'grounding' in the context of prompting AI to help write a literature review section?",opts:["Ensuring the AI adopts a formal academic tone by specifying the target journal's style guide in the system prompt","Setting the model's temperature to zero to make output fully deterministic and reproducible","Instructing the AI to limit vocabulary to terms that appear in standard discipline-specific glossaries","Supplying the AI with the actual source texts, papers, or quotes it should draw on — so that the output is anchored to real evidence rather than to the AI's parametric memory of the field"],a:3},
  {q:"A researcher uses AI to generate Python code for a mixed-effects model, runs it without errors, and includes the output in their paper. What is the most significant risk they have not addressed?",opts:["Python is not an accepted programming language in most quantitative social science journals","AI-generated code cannot reproduce exact results across different operating systems, making the analysis irreproducible","The output will lack sufficient decimal precision for statistical reporting in peer-reviewed contexts","The code may be syntactically correct but analytically wrong — AI can generate plausible statistical code that misspecifies the model, uses an inappropriate estimator, or mishandles random effects in ways that produce incorrect results without errors"],a:3},
  {q:"When using AI to assist with qualitative data analysis, what is the most important human role that should not be delegated to the AI?",opts:["Transcribing and formatting interview transcripts","Counting word frequencies and producing preliminary descriptive statistics","Formatting the final codebook and thematic summary in the style required by the target journal","Interpreting the meaning of emerging codes, adjudicating when data excerpts fit a category boundary case, and grounding analytical decisions in deep familiarity with the research context"],a:3},
  {q:"A research team uses AI to generate 20 candidate hypotheses from a literature synthesis, then selects three to test. Which best describes the epistemic status of this workflow?",opts:["AI-generated hypotheses carry the same epistemic weight as hypotheses derived through traditional theoretical reasoning","This workflow is methodologically invalid because generating hypotheses after reviewing the literature constitutes HARKing","AI hypothesis generation is only appropriate in fields where hypotheses can be tested using automated experimental systems","The hypotheses are starting points that must be evaluated by domain experts for novelty, testability, and fit with existing theory before committing resources — the AI generates candidates, not conclusions"],a:3},
  {q:"What does it mean to ask an AI to 'steelman' a hypothesis you find implausible, and why is this a useful research technique?",opts:["It means having the AI rewrite the hypothesis using stronger quantitative language to make it more publishable","It means asking the AI to identify which prior papers support the hypothesis so you can cite them in the review","It means having the AI generate a formal logical proof of the hypothesis using symbolic reasoning","It means prompting the AI to construct the most compelling possible argument in favor of the hypothesis — surfacing evidence and mechanisms you may have dismissed — which guards against premature closure on the hypothesis space"],a:3},
  {q:"A journal editor uses AI to screen submissions for statistical reporting errors before peer review. A paper passes the AI screen and is sent to reviewers. What should reviewers understand about this system?",opts:["AI screening has replaced the need for reviewers to check statistical reporting — reviewer attention can shift to theoretical contribution","Papers that pass AI statistical screening are certified as methodologically sound and can be accepted with minimal further review","AI screening is most reliable for standard regression and unreliable for any analysis involving machine learning or Bayesian methods","AI screening catches known error patterns but cannot assess whether the statistical approach is appropriate for the research question, whether assumptions are met, or whether conclusions are warranted by the results"],a:3},
  {q:"Which best describes the current emerging consensus on disclosing AI use in peer-reviewed research?",opts:["AI use need only be disclosed if the AI generated text that appears verbatim in the final manuscript","AI use in data analysis must be disclosed, but AI use in writing assistance is considered equivalent to grammar software and does not require disclosure","Only AI use that occurred during the experiment itself requires disclosure — AI used during writing or analysis does not","AI tools should be disclosed in the methods or acknowledgments section with sufficient specificity for reproducibility, including which tools were used and for what purposes — the researcher retains full responsibility for all claims"],a:3},
  {q:"A researcher uses Zotero's browser clipper to save papers and then uses AI to generate summaries for their literature review. What is the critical difference between this and asking AI to generate citations from scratch?",opts:["The browser clipper approach is slower and produces lower-quality summaries","Zotero's summaries are generated by a different AI system specialized for academic literature and therefore more accurate","The browser clipper approach requires the researcher to read every paper in full before AI summarization, defeating the efficiency advantage","In the browser clipper workflow, the papers being summarized actually exist and were selected by the researcher — the AI summarizes real documents the researcher has verified, rather than generating plausible-sounding references that may be fabricated"],a:3},
  {q:"What is a 'living systematic review' and how does AI most usefully support it compared to a one-time systematic review?",opts:["A living systematic review focuses on biological organisms and benefits from AI's ability to identify taxonomic classifications automatically","A living systematic review is identical to a standard systematic review but published online rather than in print, where AI assists with formatting and web publication","A living systematic review is conducted in real time during a research conference, where AI synthesizes presentations as they occur","A living systematic review is continuously updated as new evidence emerges — AI can monitor relevant databases for new papers matching the review's inclusion criteria and flag them for human evaluation, reducing the labor of maintaining currency over time"],a:3},
  {q:"A researcher is writing a response to a reviewer requesting additional analysis that would require data the team doesn't have. Which AI-assisted approach is most appropriate?",opts:["Ask the AI to decline the reviewer's request without explaining why, to avoid giving grounds for rejection","Use AI to generate a simulated version of the requested analysis using synthetic data, which can satisfy the reviewer's concern","Ask the AI to identify a precedent paper that declined a similar reviewer request, and cite that precedent as grounds for refusing engagement","Provide the AI with your reasoning for why the additional analysis is not feasible, and ask it to help frame a response that acknowledges the reviewer's point has scientific merit, explains the limitation clearly, and defends the validity of the existing analysis"],a:3},
  {q:"A researcher wants to communicate a technical finding to a newspaper audience. Which AI prompt pattern is most likely to produce an accurate and accessible result?",opts:["Ask the AI to write the explainer directly without providing domain context, since the AI's general knowledge is sufficient","Ask the AI to identify the three most commonly used analogies for this type of research in past science journalism, and use those analogies directly without modification","Provide the AI with the published paper and ask it to shorten the abstract to 250 words, since abstracts are written for broad scientific audiences","Describe the research in technical terms, specify the target audience, ask the AI to generate the explainer, and then review it carefully for scientific accuracy — the AI may introduce vivid but technically misleading analogies that require correction"],a:3},
  {q:"What is the specific structural function of the Specific Aims page in an NIH grant application, and what role should AI play in developing it?",opts:["The Specific Aims page is a technical appendix summarizing the experimental design — AI can generate it directly from the Research Strategy section with minimal review","The Specific Aims page primarily satisfies administrative requirements and has little effect on reviewer scores — AI's role is to ensure formatting compliance","The Specific Aims page is evaluated by program officers rather than peer reviewers, so AI communication-style improvements are more important than scientific content in this section","The Specific Aims page establishes significance, identifies the gap, and articulates the hypothesis and aims in one page — it is the reviewer's first and often most influential impression. AI is most useful for editing and structural critique of drafts the researcher has written, not for generating the core content"],a:3},
  {q:"A research team has members with widely different AI fluency. Some verify AI outputs; others share AI-generated content directly without checking. What is the most effective team-level intervention?",opts:["Restrict AI tool access to team members who have passed a formal AI proficiency test","Designate one AI-fluent team member to handle all AI interactions, preventing less experienced members from using AI tools independently","Purchase institutional AI tools with built-in verification features that automatically flag hallucinations","Establish explicit team norms requiring all AI-generated content shared as input to team decisions to be labeled as AI-assisted and reviewed by the person sharing it — making verification a shared expectation independent of individual skill levels"],a:3},
  {q:"Two team members used different AI tools to summarize the same paper for a shared literature database, and their summaries contradict each other on a key finding. What does this most directly illustrate?",opts:["International research collaborations should require all team members to use the same AI tool to ensure consistency","One of the two team members made an error in prompting and should regenerate their summary using the other member's exact prompt","The contradiction demonstrates that AI tools are insufficiently reliable for collaborative literature synthesis","AI-generated summaries are interpretive artifacts that reflect both the tool's training and the prompt used — the contradiction should be resolved by reading the original paper, and the team should establish prompting conventions so that summaries generated by different members are comparable"],a:3},
  {q:"AlphaFold's impact on structural biology is best described as which of the following?",opts:["AlphaFold automated X-ray crystallography, eliminating the need for wet lab protein structure determination and suggesting AI will replace experimental biology","AlphaFold demonstrated that AI can reason about biological mechanisms from first principles, suggesting AI will eventually replace theoretical biology","AlphaFold improved the speed of existing structure determination workflows by approximately 10-fold, representing an incremental productivity improvement rather than a qualitative change","AlphaFold made a computationally intractable prediction problem tractable at scale, opening new experimental programs that weren't previously possible — suggesting AI's most transformative contributions come in domains where a well-defined prediction task was the bottleneck, not in replacing the scientific judgment that acts on those predictions"],a:3},
  {q:"A researcher is concerned that using widely-adopted AI literature tools is causing their group's hypothesis generation to converge with other groups using the same tools. Which response best addresses this concern?",opts:["The concern is unfounded because AI systems generate outputs stochastically — different groups receive different suggestions","The concern applies only to groups in the same subfield — interdisciplinary groups using the same tools won't converge because they approach the literature from different starting points","The solution is to use AI tools from different providers, since different training datasets produce sufficiently different hypotheses to maintain research diversity","The concern is legitimate — AI tools trained on existing literature will systematically surface mainstream hypotheses. Researchers should deliberately prompt AI to argue for unpopular positions, identify prematurely dismissed approaches, and explore the tails of the hypothesis distribution rather than just using AI recommendations as a starting point"],a:3},
  {q:"A paper describes an automated laboratory system that designed and ran experiments using Bayesian optimization, discovering new photovoltaic materials faster than human-directed experimentation. What does this most directly demonstrate?",opts:["AI systems can now independently conduct scientific research from hypothesis generation through publication, replacing the need for human researchers in materials science","AI systems can efficiently navigate high-dimensional experimental search spaces using optimization strategies that outperform human intuition for specific well-defined tasks — but the task definition, scientific interpretation, and determination of what constitutes success still require human judgment","This demonstrates that all experimental research in materials science should transition to automated laboratory platforms immediately","Bayesian optimization by AI is equivalent to genuine scientific reasoning, meaning AI systems in this case were acting as genuine scientific contributors warranting authorship credit"],a:1},
  {q:"What does reproducibility mean for a research paper in which AI was used to assist with literature screening, data analysis code generation, and drafting the discussion section?",opts:["The paper is reproducible as long as the final manuscript is made open access","AI-assisted research cannot be reproducible by definition, because AI outputs are stochastic and cannot be exactly replicated with the same model and prompt","Reproducibility applies only to the experimental and statistical components — writing assistance from AI requires no documentation beyond standard manuscript acknowledgment","Reproducibility requires that AI-assisted steps be documented with sufficient specificity — including which tools and versions were used, the exact prompts applied, and what verification steps were taken — so another researcher could assess and, where feasible, replicate the AI-assisted steps"],a:3},
  {q:"Which combination of skills will most distinguish productive researchers in an AI-augmented scientific environment over the next decade?",opts:["Rapid reading speed and large working memory, which allow researchers to process more literature than AI tools can","Proficiency with a broad range of AI tools and platforms, staying current with the fastest-changing part of the research stack","Statistical fluency in the methods AI tools use internally, including transformer architecture and attention mechanisms","Deep domain expertise combined with the ability to critically evaluate AI outputs, specify what AI should do with precision, and interpret unexpected findings in ways that extend existing theory — because AI handles volume and pattern-matching, while human judgment on meaning, validity, and direction becomes the primary constraint"],a:3}
];
let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){
  activeQuestions=ALL_QUESTIONS.map(q=>{
    const correct=q.opts[q.a];
    const s=shuffle([...q.opts]);
    return{...q,opts:s,a:s.indexOf(correct)};
  });
  userAnswers={};
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  renderQuestions();
};
function renderQuestions(){
  const c=document.getElementById('questions-container');
  c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');
}
window.selectOpt=function(qi,oi){
  userAnswers[qi]=oi;
  activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});
  const answered=Object.keys(userAnswers).length;
  document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';
  document.getElementById('submit-btn').disabled=answered<activeQuestions.length;
};
window.submitQuiz=async function(){
  let correct=0;
  activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});
  const pct=Math.round(correct/activeQuestions.length*100);
  const passed=pct>=70;
  if(passed&&currentUser){
    try{
      const id='RES-'+Date.now();
      await setDoc(doc(db,'users',currentUser.uid),{researchCertId:id},{merge:true});
      await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'AI for Research and Academia — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});
      document.getElementById('cert-id-text').textContent=id;
      document.getElementById('cert-box').style.display='block';
    }catch(e){}
  }
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-icon').textContent=passed?'🎓':'📖';
  document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';
  document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;
  document.getElementById('result-msg').textContent=passed?'Congratulations — you\'ve demonstrated expert-level understanding of AI for Research and Academia.':'You need 70% to pass. Review the modules and try again when you\'re ready.';
  if(!passed){document.getElementById('retry-btn').style.display='inline-block';}
  document.getElementById('result-screen').style.display='block';
};
window.retryQuiz=function(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('cert-box').style.display='none';
  document.getElementById('retry-btn').style.display='none';
  window.startQuiz();
