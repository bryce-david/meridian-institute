<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — AI and Society — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#7C3AED;--accent-dim:rgba(124,58,237,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#6D28D9;--accent-dim:rgba(109,40,217,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(124,58,237,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
<style>@media(max-width:480px){.nav-divider{display:none}.nav-left{gap:8px}}</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>AI and Society</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"What is the best description of how AI affects labor displacement, according to the course?",opts:["AI eliminates jobs only in manufacturing and has no effect on white-collar professional work","AI automates specific tasks rather than entire occupations, requiring workforce adaptation and skill shifts across most sectors","AI creates exactly as many jobs as it destroys, leaving net employment unchanged across all sectors","AI only displaces workers who lack college degrees while benefiting all college-educated workers equally"],a:1},
  {q:"Which factor most concentrates AI's economic gains among capital owners rather than distributing them broadly?",opts:["AI tools are designed to be user-unfriendly to reduce competition from small businesses","AI dramatically increases productivity while labor costs remain fixed, meaning the gains flow to capital unless policy interventions redistribute them","AI is intentionally programmed to favor existing shareholders over new market entrants","Capital owners are the only people with sufficient technical literacy to use AI tools effectively"],a:1},
  {q:"What is 'surveillance capitalism' as Shoshana Zuboff defines it?",opts:["A military-industrial complex in which governments sell surveillance technology to the highest bidder","A business model based on the extraction and monetization of behavioral data to predict and modify human behavior for profit","A government policy requiring corporations to surveil their own employees for national security purposes","The practice of investors monitoring AI company performance through proprietary surveillance of research output"],a:1},
  {q:"A predictive policing system trained on historical arrest data predicts higher crime risk in minority neighborhoods. What is the most direct explanation for this outcome?",opts:["Minority neighborhoods genuinely have higher crime rates so the model is correctly identifying real statistical patterns","Historical arrest data reflects past over-policing, so training on it encodes and amplifies existing racial biases into future police decisions","The model is technically flawed and should be retrained on data from predominantly white neighborhoods instead","Predictive policing systems always produce random results regardless of the training data they use"],a:1},
  {q:"What is the 'filter bubble' effect and how does it relate to democratic discourse?",opts:["A technical mechanism that prevents spam from reaching users' inboxes on email and messaging platforms","When algorithmic personalization confines users primarily to information confirming their existing views, reducing exposure to diverse perspectives and shared factual ground","A government censorship tool that filters politically disfavored content from social media platforms","A regulatory concept requiring platforms to filter political advertising during the 30 days before an election"],a:1},
  {q:"What is a key concern about AI companion chatbots and social isolation?","opts":["They are too expensive for most people to access and therefore have minimal societal reach","Relationships with AI companions may substitute for human connection without offering genuine reciprocity, potentially reducing the motivation to invest in harder but more fulfilling human relationships","Companion AI is technically incapable of simulating emotional responses so there is no risk of users forming attachments","These systems have been banned in most countries due to the demonstrated risk of social isolation they create"],a:1},
  {q:"What does 'algorithmic bias' mean in the context of AI's effects on society?",opts:["Code that contains syntax errors causing incorrect outputs when processing demographic data","When AI systems produce systematically different outcomes for different social groups, often reflecting biases in training data or system design choices","A technique for optimizing algorithms to run faster on limited computational resources","When AI systems produce random errors that occasionally disadvantage certain groups without any systematic pattern"],a:1},
  {q:"The COMPAS recidivism scoring algorithm has been criticized for disproportionately labeling Black defendants as high risk. Why does this matter for society?","opts":["It matters primarily because it reduces the predictive accuracy of the overall model for all defendants equally","It matters because biased risk scores can influence bail, sentencing, and parole decisions — making algorithmic bias in criminal justice a direct driver of inequitable life outcomes","It matters only for defendants who choose to challenge their score through the legal system","It matters because it reveals that AI companies are intentionally programming their systems to discriminate based on race"],a:1},
  {q:"What is 'ethics washing' and why is it a risk in AI development?",opts:["A data cleaning technique used to remove biased examples from AI training datasets","The practice of using AI ethics principles and public commitments for reputational benefit while continuing practices those principles should prohibit — form over substance","An industry certification program that validates AI systems as meeting minimum ethical standards","A regulatory compliance framework requiring AI companies to complete quarterly ethics audits"],a:1},
  {q:"What does the 'environmental cost of AI' primarily encompass?",opts:["The cost of printing and distributing academic papers about AI and climate change","The significant energy consumed in training and running AI models plus the water used for data center cooling and the emissions from hardware manufacturing","AI environmental consulting services sold by technology firms to sustainability-focused companies","Carbon credits purchased by AI companies to offset their certified environmental impact"],a:1},
  {q:"What is the 'WEIRD problem' in AI development and why does it matter globally?",opts:["An acronym describing common AI bugs that appear Weird, Erratic, Inconsistent, Rare, or Destructive","The overrepresentation of Western, Educated, Industrialized, Rich, Democratic populations in AI development — leading to systems that fail to generalize to the majority of the world's population","A type of AI security vulnerability that causes unpredictable behavior in high-stakes deployments","AI systems that behave appropriately in testing but unpredictably in real-world deployment conditions"],a:1},
  {q:"How can AI exacerbate economic inequality in hiring specifically?",opts:["By making all hiring decisions randomly, removing the human judgment that previously favored qualified candidates","By learning from historical hiring data that reflected past discrimination, perpetuating those patterns at scale and at speed","By making hiring too slow for companies to fill positions efficiently, reducing overall employment levels","By exclusively considering educational credentials, which disadvantages self-taught and non-traditional candidates"],a:1},
  {q:"What is 'participatory design' and why does it matter for AI developed for social good?",opts:["Letting platform users vote on which app features the development team should build next","Involving affected communities as genuine decision-making participants in designing AI systems that will affect them — ensuring systems reflect actual needs rather than assumed ones","A type of crowdfunding model where communities finance AI tools they want to see built","Open-source AI development where any member of the public can contribute code and design decisions"],a:1},
  {q:"What does 'informed consent' genuinely require in the context of AI and personal data?",opts:["Signing a terms-of-service document, however long or complex it may be","That individuals genuinely understand how their data will be used — including in AI training — before agreeing, not just nominal agreement through obscure legal text","Consent from AI researchers only, with end-user consent not required for research purposes","Government approval for each type of data collection before any company can begin gathering it"],a:1},
  {q:"Why is diversity in AI development teams an equity concern, not merely a workplace culture issue?",opts:["Diverse teams are required by law in most jurisdictions that regulate AI development","Homogeneous teams are more likely to miss failure modes, overlook needs of underrepresented populations, and build systems that work less well for people unlike the team","Diverse teams work more slowly, producing less AI output, which slows the pace of potential harm","Diversity primarily matters for the marketing and communications of AI products, not for their technical design"],a:1},
  {q:"What is 'AI colonialism' and why has it been raised as a concern?","opts":["AI systems that enforce colonial-era territorial borders using computer vision","Patterns where AI benefits accrue primarily to wealthy countries and technology companies while the costs — labor, data extraction, environmental — are disproportionately borne by poorer countries and communities","A political movement opposing the use of AI in formerly colonized nations","AI used by postcolonial governments to enforce surveillance over their own populations"],a:1},
  {q:"What is the 'value alignment problem' in AI and why does it matter for society?",opts:["A pricing disagreement between AI companies and their corporate customers about the value of AI services","The challenge of ensuring AI systems pursue goals genuinely aligned with human values rather than proxy metrics that can diverge from what we actually care about","A technical problem with aligning the parameters of different AI models to enable them to collaborate","A regulatory compliance problem requiring AI systems to align with different legal requirements across different jurisdictions"],a:1},
  {q:"What does 'structural inequality' mean in the context of AI's societal effects?",opts:["Unequal distribution of physical AI infrastructure such as data centers and fiber optic cables","Systemic disparities rooted in historical economic and social systems that AI can reinforce or deepen if not actively countered through deliberate design and policy","A type of software architecture vulnerability that creates performance differences between demographic groups","Inequality between AI companies in their ability to attract investment and research talent"],a:1},
  {q:"How do platform recommendation algorithms relate to social polarization, according to research on this topic?",opts:["Algorithms actively promote political moderation and have been demonstrated to reduce polarization in most studied cases","By optimizing for engagement, algorithms may systematically amplify outrage-inducing and extreme content, since that content drives more user interaction even as it deepens divisions","Algorithms have no measurable effect on political beliefs and function only as neutral content distribution mechanisms","Polarization effects are limited to explicitly political platforms and do not occur on entertainment or lifestyle platforms"],a:1},
  {q:"What is 'gig worker surveillance' and what power dynamic does it create?",opts:["Workers filming each other to report misconduct to platform operators and labor regulators","AI platforms monitoring gig workers' location, performance, and behavior in real time — often with limited transparency — creating asymmetric power where workers are subject to algorithmic management with little recourse","Workers using AI tools to monitor their own productivity and negotiate better pay rates based on performance data","A type of workplace safety technology that tracks gig workers for insurance purposes with full informed consent"],a:1},
  {q:"Why does the course treat AI and journalism as raising concerns beyond simple misinformation?",opts:["Journalists are the only professional group that has been granted explicit legal protection from AI-generated competition","AI threatens the economic model of quality journalism through content automation and ad revenue disruption, while also creating new misinformation vectors that journalism exists to counter","AI has already replaced all human journalists at major news organizations so this is no longer a forward-looking concern","The concern is limited to AI-generated satirical content that people might mistake for real news reporting"],a:1},
  {q:"What does 'equitable AI' require beyond simply providing 'equal AI'?",opts:["Equal accuracy scores for all user groups as measured by standard technical benchmark evaluations","Affirmative design that accounts for different starting points and needs, aiming to reduce gaps rather than merely treating all groups identically regardless of their different circumstances","Equal pricing for all AI services regardless of the user's ability to pay or geographic location","The same underlying data and model architecture deployed identically for all user populations"],a:1},
  {q:"What is the 'Masakhane' initiative and what does it represent about AI development?",opts:["A Silicon Valley AI accelerator program focused on emerging market applications","A grassroots African NLP research community building language technology for African languages — representing community-led, locally grounded AI development outside dominant Western technology centers","A type of AI hardware optimized for low-power deployment in communities without reliable electricity","An international AI governance treaty focused on technology transfer to developing nations"],a:1},
  {q:"What philosophical challenge makes the question of AI consciousness and moral status genuinely difficult rather than obviously resolved?",opts:["AI systems are made of silicon rather than carbon-based biology, which makes consciousness physically impossible in principle","We lack a scientific consensus on what consciousness actually is or what gives an entity moral status, making it genuinely unclear how to assess these questions for AI systems with novel architectures","The question is already settled — AI systems are definitively not conscious — so philosophical discussion is no longer productive","AI consciousness is only a concern for future superintelligent AI and has no relevance to current systems in any form"],a:1},
  {q:"What is the most important condition for a genuinely equitable AI future, according to the course?",opts:["More powerful AI models that achieve higher accuracy across all demographic groups simultaneously","Active deliberate choices by governments, companies, civil society, and citizens — equitable outcomes require intentional design, regulation, and accountability, not just technical progress","Faster internet infrastructure that provides all people equal bandwidth access to AI services","AI developed entirely by nonprofit organizations free from commercial incentives and shareholder pressure"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25);userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='SOC-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{societyCertId:id},{merge:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of AI and Society.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
