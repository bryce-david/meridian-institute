<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — AI in Education — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#0284C7;--accent-dim:rgba(2,132,199,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#0369A1;--accent-dim:rgba(3,105,161,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(2,132,199,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;margin-bottom:0;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  #quiz-area{display:none;}#start-screen{}.start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}
  .q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}
  .result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}
  .result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
<style>@media(max-width:480px){.nav-divider{display:none}.nav-left{gap:8px}}</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>AI in Education</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;">
      <div class="cert-label">Certificate ID</div>
      <div class="cert-id" id="cert-id-text"></div>
    </div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"A school deploys an AI tutoring system that gives identical hints to all students who make the same type of error. What is the limitation of this approach?",opts:["The AI is too slow to provide hints in real time during a timed assessment","Students with different conceptual gaps can make identical surface errors for different underlying reasons","AI tutoring systems are not permitted to give hints under current academic integrity policies","The system would need a separate database for every possible error type across all subjects"],a:1},
  {q:"What is the primary mechanism by which adaptive learning systems personalize instruction?",opts:["They assess student interest surveys at enrollment and never change the curriculum afterward","They adjust the difficulty, pacing, and content based on ongoing analysis of a student's performance patterns","They replace teachers with AI instructors who have been trained on each student's learning file","They assign students to fixed ability groups at the start of the year based on a single placement test"],a:1},
  {q:"A teacher asks an AI to generate ten multiple-choice questions on the American Revolution. What is the most important review step before using them?","opts":["Checking that the questions use the correct font and formatting for the school's assignment template","Verifying that each question and its correct answer are historically accurate and pedagogically appropriate","Confirming that the questions are long enough to meet the assignment's word count requirement","Ensuring the AI did not use any vocabulary above grade level in any of the four answer options"],a:1},
  {q:"What does 'Bloom's Taxonomy' contribute to evaluating AI-generated educational content?",opts:["It provides a legal framework for attributing AI-generated educational materials","It offers a hierarchy of cognitive skills that helps educators judge whether AI content targets recall or deeper thinking","It is the federal regulation governing data privacy for AI tools used in K-12 education","It specifies the minimum number of questions an AI quiz must contain to be considered valid"],a:1},
  {q:"Why is detecting AI-generated student work fundamentally difficult rather than merely technically challenging?",opts:["AI detectors are too expensive for most schools to license and deploy for everyday use","The boundary between AI-assisted and AI-generated work is genuinely fuzzy, and detectors have high false-positive rates","Students always disclose AI use honestly when directly asked by their teacher","AI-generated text is stylistically distinct from student writing and easily identifiable by any experienced teacher"],a:0},
  {q:"Khan Academy's Khanmigo AI tutor asks students guiding questions rather than giving answers directly. What pedagogical principle does this reflect?",opts:["Rote memorization is the most effective approach to durable learning outcomes","Socratic guidance builds reasoning skills and requires students to construct understanding rather than just receive it","AI tutors are forbidden from giving direct answers under Khan Academy's licensing agreements","The AI lacks the confidence to provide direct answers and defaults to questions as a fallback"],a:1},
  {q:"What does FERPA primarily protect in the US educational context?",opts:["Copyright of educational materials created by teachers and licensed to schools","Student education records and the privacy rights of students and their parents","Teacher employment rights and professional licensing requirements","Physical school infrastructure and the data stored on school-owned hardware"],a:1},
  {q:"A district implements an AI system that flags students as 'at-risk of dropping out' based on attendance and grades. What is the most important governance concern?",opts:["The system may be too expensive to maintain and operate across all schools in the district","If flagged students are stigmatized or tracked into lower expectations, the label can become a self-fulfilling prophecy","The system requires too much teacher training time and distracts from core instructional responsibilities","At-risk predictions are inherently inaccurate because they rely on attendance data that schools record inconsistently"],a:1},
  {q:"How can AI tools specifically support students with disabilities in the classroom?",opts:["By waiving all assessment requirements for students with documented disabilities who use AI tools","Through real-time captioning, text-to-speech, adaptive interfaces, and pacing adjustments that extend existing accommodation frameworks","By replacing the legally required individualized education plan process with automated AI assessment","By segregating students with disabilities into separate AI-only learning environments away from general education"],a:1},
  {q:"What is 'data minimization' as an ethical requirement for educational AI systems?",opts:["Reducing the total number of students who are permitted to use the AI tool in any given school","Collecting only the student data genuinely necessary for the system's educational function — no more","Using smaller AI models to reduce computing costs and environmental impact of school-based AI tools","Requiring that all student data be deleted at the end of each school day regardless of educational need"],a:1},
  {q:"Why does the 'digital divide' create an equity problem specifically for AI-enhanced education?",opts:["Students who use AI tools score higher on standardized tests than those who do not use them","Students without reliable internet or devices are excluded from AI-enhanced learning, concentrating benefits among already-advantaged populations","Schools in wealthy districts are legally prohibited from using AI tools so they do not benefit from them either","AI tools are designed primarily for English-speaking students, excluding non-English speakers regardless of access"],a:1},
  {q:"What does 'explainable AI' mean in an educational assessment context?",opts:["An AI that can verbally explain every subject the student studied during the course of the semester","AI whose scoring or recommendation decisions can be understood, audited, and contested — essential for fair student assessments","An AI system that teaches students how to explain their reasoning before submitting any work","AI limited to simple factual questions where explanations are always straightforward and unambiguous"],a:1},
  {q:"A student submits an essay that passes an AI detector but was written primarily by an AI with minor human edits. What does this scenario most directly challenge?","opts":["The speed at which teachers can grade essays in a class with thirty or more students","The validity of AI detection as a reliable mechanism for upholding academic integrity policies","Whether the student has sufficient device access to use AI tools outside of the school building","The school's policy on late assignment submissions and extension requests"],a:1},
  {q:"What is the primary role of a teacher in an AI-enhanced classroom, according to the course?",opts:["To input data into AI systems and monitor dashboards rather than interact directly with students","To facilitate, mentor, and provide the human connection, cultural responsiveness, and relational trust that AI cannot replicate","To grade AI-generated feedback and correct any errors before passing it on to students","Only to conduct summative assessments since AI handles all formative instruction and feedback"],a:1},
  {q:"Carnegie Learning's MATHia platform adjusts the types of problems it presents based on student performance. What research finding most strongly supports this approach?","opts":["Students who receive randomly selected problems score higher than those who receive targeted practice","Targeted practice on specific misconceptions is more efficient than repeated practice on already-mastered skills","Students prefer variety in practice problems regardless of their current mastery level","Adaptive practice only benefits high-achieving students and widens the achievement gap for struggling learners"],a:1},
  {q:"What does 'algorithmic bias' mean in the context of educational AI?",opts:["When the AI's code contains syntax errors that slow the system during high-traffic periods","When AI systems produce systematically worse outcomes for certain student groups, often reflecting biases in training data or design","When algorithms take too long to grade assignments, giving some students an unfair wait time advantage","When identical algorithms produce different outputs depending on which browser or device the student uses"],a:1},
  {q:"A school's AI grading system consistently gives lower scores to essays written in African American English than to essays with identical argument quality in Standard American English. What is this an example of?","opts":["A technical error in the grading rubric that the vendor can easily fix with a software patch","Algorithmic bias that can disadvantage students based on dialect, reflecting bias in the training data the system used","A correct grading outcome since Standard American English is the appropriate register for formal academic writing","An acceptable trade-off between grading efficiency and linguistic inclusivity in large-scale assessment systems"],a:1},
  {q:"Why is educator professional development essential — not optional — when deploying AI tools in schools?",opts:["So teachers can build and maintain their own AI systems rather than relying on commercial vendors","Teachers need to understand AI tools well enough to use them critically, detect failures, and protect students from harms they cannot see","AI tools replace the need for ongoing professional development since the system improves its own performance over time","So schools can market themselves as innovative to prospective families and in district accreditation reviews"],a:1},
  {q:"What does 'formative assessment' mean and why is it an especially well-suited use case for AI in education?","opts":["Summative evaluation at the end of a course that determines final grades and credit for the year","Ongoing, low-stakes feedback during learning that helps students improve — AI can provide this continuously and at scale without overwhelming teachers","An administrative form required to document student learning accommodations for the annual IEP review","Assessment designed to identify gifted students for enrollment in advanced academic programs"],a:1},
  {q:"A parent is concerned about their child's data being used to train an AI tutoring system's next version. What governance principle is most directly relevant?","opts":["The principle of speed — data should be used as quickly as possible to improve the product for all students","The principle of informed consent — parents and students should understand how data will be used, including in model training, before agreeing","The principle of efficiency — anonymized student data should always be available for research without individual consent","The principle of accuracy — as long as the data is correct, its use for any educational purpose is automatically permissible"],a:1},
  {q:"What is a 'flipped classroom' model enhanced by AI?","opts":["Students never come to school and all learning occurs through AI-delivered remote instruction","Students engage with AI-delivered content and direct instruction at home, then apply and deepen learning with teacher support in class","Teachers record all lessons using AI video tools and students watch them together during class time","AI handles all in-class instruction while teachers work remotely to analyze dashboard data and plan future lessons"],a:1},
  {q:"How should a school district evaluate a commercial AI tool before deploying it with students?","opts":["Primarily by reviewing the vendor's marketing materials and customer testimonials from other districts","By examining data privacy terms, algorithmic fairness evidence, vendor data practices, required educator training, and efficacy research","By selecting whichever tool costs the least and is already used by the largest number of neighboring districts","By asking the company's sales representative to demonstrate the product and accepting their performance claims at face value"],a:1},
  {q:"What does 'critical AI literacy' require of students beyond the ability to use AI tools effectively?","opts":["The ability to write code that interacts directly with AI model APIs","The ability to question AI-generated content, recognize its limitations, understand bias risks, and make informed judgments about when and how to use AI","Achieving a specific score on a standardized digital skills certification administered by a credentialing body","Using multiple AI tools simultaneously to cross-reference and verify all outputs before submitting any work"],a:1},
  {q:"Why is equity the central challenge — not a secondary consideration — in deploying AI in education?","opts":["Equity concerns are primarily addressed through hardware donations that give all students equivalent device access","If access to AI tools is unequal, AI can amplify existing educational gaps rather than close them, concentrating advantage among already-privileged students","Equity in education is already ensured by existing federal law so AI does not introduce any new equity considerations","Equity only becomes a concern after AI tools have been deployed for at least three years and performance data is available"],a:1},
  {q:"What is the most important condition for AI tools to genuinely improve learning outcomes rather than just engagement metrics?","opts":["The AI tool must be visually appealing and gamified so students are motivated to spend more time using it","The AI tool must be grounded in evidence-based learning science and regularly evaluated against real learning outcomes — not just user satisfaction","The AI tool must be developed by a company with at least ten years of experience in the K-12 education market","The AI tool must be recommended by at least three peer districts before being evaluated for potential adoption"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

window.startQuiz=function(){
  activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25);
  userAnswers={};
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  renderQuestions();
};
function renderQuestions(){
  const c=document.getElementById('questions-container');
  c.innerHTML=activeQuestions.map((q,qi)=>`
    <div class="q-block" id="qb-${qi}">
      <div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.opts.map((o,oi)=>`
          <label class="q-opt" id="opt-${qi}-${oi}">
            <input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">
            ${o}
          </label>`).join('')}
      </div>
    </div>`).join('');
}
window.selectOpt=function(qi,oi){
  userAnswers[qi]=oi;
  activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});
  const answered=Object.keys(userAnswers).length;
  document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';
  document.getElementById('submit-btn').disabled=answered<activeQuestions.length;
};
window.submitQuiz=async function(){
  let correct=0;
  activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});
  const pct=Math.round(correct/activeQuestions.length*100);
  const passed=pct>=70;
  if(passed&&currentUser){
    try{const id='EDU-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{educationCertId:id},{merge:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}
  }
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-icon').textContent=passed?'🎓':'📖';
  document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';
  document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;
  document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of AI in Education.':'You need 70% to pass. Review the modules and try again when you\'re ready.';
  if(!passed){document.getElementById('retry-btn').style.display='inline-block';}
  document.getElementById('result-screen').style.display='block';
};
window.retryQuiz=function(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('result-icon').textContent='';
  document.getElementById('cert-box').style.display='none';
  document.getElementById('retry-btn').style.display='none';
  window.startQuiz();
};
</script>
</body>
</html>
