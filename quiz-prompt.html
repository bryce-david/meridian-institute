<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Prompt Engineering — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#B45309;--accent-dim:rgba(180,83,9,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#92400e;--accent-dim:rgba(146,64,14,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(180,83,9,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>Prompt Engineering</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"What is the primary purpose of a system prompt in a large language model interaction?",opts:["To reduce token generation latency by pre-loading model state at the start of a session","To establish persistent instructions, persona, or context that frames all subsequent user turns","To encrypt the conversation so API providers cannot read the user's messages","To select which model version or checkpoint is used for a particular interaction"],a:1},
  {q:"What does 'temperature' control in LLM text generation?",opts:["The thermal throttling behavior of the GPU hardware processing the inference request","The randomness or creativity of outputs — higher values produce more varied responses, lower values make outputs more deterministic","The maximum number of tokens the model will generate in a single completion call","The speed at which the model streams tokens back to the calling application"],a:1},
  {q:"Which prompting technique involves providing the model with several worked examples before asking it to solve a new instance?",opts:["Zero-shot prompting, which asks the model to perform a task with no prior examples given","Chain-of-thought prompting, which asks the model to reason through steps before answering","Few-shot prompting, which provides multiple input-output examples to demonstrate the desired pattern","Role prompting, which assigns the model an expert identity before posing a question"],a:2},
  {q:"What is 'chain-of-thought' (CoT) prompting designed to improve?",opts:["The visual formatting of output, producing cleaner markdown and structured responses","The model's reasoning on multi-step problems by eliciting intermediate reasoning steps before the final answer","Token efficiency by reducing the number of output tokens needed to answer a question","Response speed by allowing the model to skip unnecessary computation steps"],a:1},
  {q:"What is the key insight behind the phrase 'Let's think step by step' as a prompt suffix?",opts:["It encourages the model to produce longer, more detailed responses to simple questions","It triggers chain-of-thought reasoning, improving performance on arithmetic, logical, and commonsense tasks","It forces the model to structure its output as a numbered or bulleted list","It instructs the API to route the request to a more capable model version"],a:1},
  {q:"What is 'role prompting' and what is its main benefit?",opts:["A technique that asks the model to enumerate all the roles it is capable of performing","Assigning the model a specific persona or expert identity to shape its tone, knowledge framing, and response style","A method that causes the model to refuse questions outside a narrowly defined topic area","A structured output technique that formats responses as role-based JSON objects"],a:1},
  {q:"What is 'prompt injection' in the context of adversarial prompting?",opts:["Adding extra context tokens to the prompt to increase inference throughput","An attack where malicious input in user-provided content attempts to override the system prompt or hijack the model's instructions","A technique for improving output quality by inserting curated examples into the user turn","A model fine-tuning method that injects task-specific examples during supervised training"],a:1},
  {q:"What is 'prompt chaining' and when is it most useful?",opts:["Linking multiple API keys in sequence so that each key is used in rotation","Breaking a complex task into sequential prompts where the output of one becomes the input of the next — useful when a single prompt cannot reliably handle the full task","Running an identical prompt multiple times and averaging the outputs for stability","Merging prompts authored by different team members into a single combined instruction"],a:1},
  {q:"What does 'output formatting' in a prompt refer to?",opts:["The visual styling applied to the chat interface that displays the model's response","Explicit instructions directing the model to structure its response in a specific way — e.g. JSON, markdown, bullet list, numbered steps","Adjusting font size and spacing in the text area where model outputs are rendered","A compression method that reduces the token count of long responses before returning them"],a:1},
  {q:"What is 'zero-shot prompting' and what does it rely on?",opts:["Prompting a model that has no learned parameters and relies only on symbolic rules","Asking the model to perform a task with no examples, relying entirely on its pre-trained knowledge and instruction-following ability","A highly efficient technique that uses zero additional GPU resources beyond baseline inference","A prompting method that deliberately starts with an empty string and builds context iteratively"],a:1},
  {q:"What is the 'lost in the middle' phenomenon in long-context prompting?",opts:["A failure mode where the model switches languages partway through a long response","Research finding that LLMs perform worse on information placed in the middle of long contexts compared to the beginning or end","An error that occurs when a prompt exceeds the model's maximum token limit","A hallucination pattern where the model invents information about the topic of the prompt"],a:1},
  {q:"What is 'self-consistency' as a prompting strategy?",opts:["A prompt instruction that explicitly tells the model to avoid contradicting itself","Generating multiple chain-of-thought reasoning paths for the same problem and selecting the most common answer — improves reliability on reasoning tasks","A technique that reuses the same prompt across different user sessions for reproducibility","A plagiarism detection method that checks model outputs against its training data"],a:1},
  {q:"What is 'instruction clarity' and why does it matter in prompt design?",opts:["A readability heuristic that restricts prompts to simple vocabulary and short sentences","Writing unambiguous, specific directives that leave no room for unintended interpretation — vague instructions produce unpredictable outputs","A word-count limit requiring prompts to stay under fifty words for best results","A design pattern that restricts prompts to binary yes/no questions for precision"],a:1},
  {q:"What is a 'meta-prompt' or 'meta-instruction'?",opts:["A prompt that contains programming code and asks the model to analyze or execute it","A prompt that instructs the model on how to interpret or respond to other prompts — used to set behavioral rules rather than answer a specific question","An unusually long prompt that spans multiple pages and includes extensive background context","A prompt specifically designed to generate executable code as its primary output"],a:1},
  {q:"What does 'context window' mean and how does it constrain prompt engineering?",opts:["The visible scrollable area of the chat UI that displays the full conversation history","The maximum number of tokens (input + output) a model can process in one call — prompt engineers must fit all necessary context within this limit","The number of conversation turns the model can hold before requiring a session reset","The persistent memory the model retains between separate API sessions or user conversations"],a:1},
  {q:"What is 'red-teaming' a language model in the context of prompt engineering?",opts:["A competitive technique where one team tries to build a model while another tries to break it","Systematically attempting to elicit unsafe, harmful, or unintended outputs by crafting adversarial prompts — used to find and patch failure modes before deployment","A method for benchmarking competing AI products using the same standardized test suite","A prompt compression strategy that reduces system prompt length while preserving behavior"],a:1},
  {q:"What is 'decomposition' as a prompting technique for complex tasks?",opts:["A formatting technique that divides a long response into clearly labeled paragraphs","Splitting a large, complex problem into smaller sub-tasks that are each prompted independently, then combining results — reduces errors from trying to do too much at once","A prompt compression method that removes redundant phrases to minimize token usage","An editing technique that strips unnecessary qualifiers from prompts to improve clarity"],a:1},
  {q:"What is the purpose of 'delimiters' (like triple backticks or XML tags) in prompts?",opts:["To reduce inference latency by helping the model tokenize the input more efficiently","To clearly separate distinct sections of a prompt — e.g. instructions from user data — preventing the model from conflating them or being injection-attacked","To trigger special output modes that format the response as syntax-highlighted code","To count the exact number of tokens in a prompt before sending it to the API"],a:1},
  {q:"What is 'grounding' a prompt and why is it used for factual tasks?",opts:["Giving the model live internet access so it can browse for up-to-date information","Providing relevant source documents or facts within the prompt so the model bases its response on supplied evidence rather than potentially incorrect parametric knowledge","Setting temperature to zero to make the model's output fully deterministic and reproducible","A role-assignment technique that tells the model to act as a domain expert before responding"],a:1},
  {q:"What is 'ReAct' (Reason + Act) prompting?",opts:["A prompt style optimized for creative and narrative writing tasks requiring imagination","A framework that interleaves reasoning traces with action steps — the model reasons about what to do, takes an action (e.g. search), observes the result, then reasons again","A safety-focused prompting technique that teaches the model to refuse harmful requests","A structured output method that formats all model responses as numbered bullet lists"],a:1},
  {q:"What is 'prompt sensitivity' and why is it a challenge?",opts:["A privacy concern arising when prompts contain personally identifiable information","The phenomenon where small, seemingly insignificant changes to a prompt wording can cause large, unpredictable changes in model output — makes reliable prompt design difficult","A description of how the model's emotional tone shifts in response to the user's tone","A token-counting problem that arises with variable-length inputs in production systems"],a:1},
  {q:"When prompting for code generation, what practice most reliably improves output correctness?",opts:["Using the shortest possible prompt to minimize the model's opportunity to misinterpret","Specifying language, desired function signature, expected inputs/outputs, edge cases to handle, and any constraints — precise technical specifications reduce ambiguity","Using role prompting exclusively to assign the model a senior engineer persona","Asking the model to be creative with the solution rather than constraining implementation choices"],a:1},
  {q:"What is 'tree of thought' (ToT) prompting?",opts:["A method for prompting the model to generate structured decision tree diagrams","An extension of chain-of-thought that explores multiple reasoning branches simultaneously, evaluating intermediate steps — allows backtracking and improves performance on complex planning tasks","A visualization technique for mapping relationships between concepts in a knowledge domain","A structured output format that nests JSON objects to represent hierarchical data"],a:1},
  {q:"What is the difference between 'instructed' and 'uninstructed' model behaviors in the context of prompt engineering?",opts:["Instructed and uninstructed behaviors are functionally identical in current LLMs","Instructed behaviors are explicitly requested in the prompt; uninstructed behaviors emerge from the model's training without direct prompting — both must be considered when designing safe systems","Uninstructed behaviors are always unsafe and must be suppressed through explicit refusal training","Instructed behaviors are less predictable and reliable than uninstructed defaults from training"],a:1},
  {q:"What is 'hallucination' in LLMs and how can prompt design mitigate it?",opts:["A multimodal capability where the model generates images in response to descriptive text prompts","When the model confidently produces factually incorrect or fabricated information — mitigated by grounding prompts with source documents, asking the model to cite evidence, or instructing it to say 'I don't know' when uncertain","A desirable creative mode where the model generates novel ideas beyond its training data","A hardware failure mode triggered by overheating during long inference runs"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='PRM-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{promptCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'Prompt Engineering — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of Prompt Engineering.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
