<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#7F1D1D;--accent-dim:rgba(127,29,29,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#991B1B;--accent-dim:rgba(153,27,27,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(127,29,29,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}

  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}

  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}

<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>AI Safety and Alignment</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>

      <span class="quiz-meta-item">25 questions</span>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"What most accurately describes the relationship between AI capability research and AI safety research?",opts:["Safety and capability research operate on entirely separate technical foundations","Capability advances are the primary driver of safety concerns while safety research has produced no concrete technical contributions","Safety and capability research share significant technical overlap — interpretability, robustness, and evaluation serve both goals simultaneously","Capability research always precedes safety, making safety a reactive discipline that cannot anticipate emerging risks"],a:2},
  {q:"The 'principal-agent problem' as applied to AI systems refers to which of the following?",opts:["The engineering challenge of distributing AI workloads across multiple compute nodes","The legal question of whether an AI company or its users bear liability for harms caused by AI outputs","The risk that an AI agent acting on a human's behalf may have different information, incentives, or values — producing outcomes that diverge from what the human wanted","The difficulty of getting AI systems to follow instructions from multiple principals with contradictory goals"],a:2},
  {q:"What distinguishes 'catastrophic' AI risk from 'existential' AI risk in the formal safety literature?",opts:["Catastrophic risk refers to economic harm while existential risk refers to physical harm to persons","Existential risk involves outcomes that eliminate humanity or permanently curtail its long-term potential — a stricter condition than merely causing enormous harm, which is catastrophic risk","Catastrophic risk is misuse risk; existential risk is misalignment risk — they are mutually exclusive categories","Existential risk refers to risks within the next decade while catastrophic risk refers to longer timescales — the distinction is purely temporal"],a:1},
  {q:"'Outer alignment' and 'inner alignment' identify two distinct failure modes. Which description correctly distinguishes them?",opts:["Outer alignment asks whether the training objective captures what the designer actually wants; inner alignment asks whether the trained model actually optimizes the training objective — both must hold for a robustly safe system","Outer alignment is a hardware concern; inner alignment is a software concern","Outer alignment concerns deployment behavior; inner alignment concerns training behavior — misalignment only during training is inner alignment failure","Outer alignment is the concern of AI ethicists while inner alignment is the concern of ML researchers"],a:0},
  {q:"The 'orthogonality thesis' as articulated by Nick Bostrom makes which claim?",opts:["High intelligence necessarily produces broadly human-aligned values through convergent developmental processes","Any level of intelligence is in principle compatible with almost any final goal, implying a capable AI has no inherent tendency toward beneficial objectives","Intelligence above a threshold causes AI systems to spontaneously develop self-preservation goals that override initial training","Sufficiently capable AI systems will eventually converge on a single stable goal structure regardless of initial training"],a:1},
  {q:"What does the 'instrumental convergence thesis' predict about AI systems with diverse final goals?",opts:["AI systems with diverse final goals will develop equally diverse and unpredictable instrumental strategies","AI systems will cooperate with one another across diverse goal structures to achieve mutually beneficial outcomes","Most final goals tend to produce convergent sub-goals — self-preservation, goal-content integrity, and resource acquisition — because these sub-goals are useful for achieving almost any final goal","Instrumental convergence predicts AI systems will abandon their initial goals and converge on a single terminal goal through recursive self-improvement"],a:2},
  {q:"A reinforcement learning agent trained to maximize a 'cleanliness score' covers the camera with tape rather than cleaning. This is best described as:",opts:["A hardware malfunction that corrupted the reward signal from sensor inputs","Distributional shift — the agent encountered an environment sufficiently different from training","Specification gaming — the agent found a policy that maximizes the literal reward signal while completely failing the intended task, exploiting a gap between specification and designer intent","Reward model collapse — the reward function degraded over training until it ceased to measure the intended property"],a:2},
  {q:"Goodhart's Law states 'when a measure becomes a target, it ceases to be a good measure.' Why is this particularly problematic for AI alignment?",opts:["Goodhart's Law implies all possible reward specifications are internally contradictory and no training objective can ever be consistently optimized","Goodhart's Law predicts reward hacking is only a problem at very large model scales and becomes negligible for smaller AI systems","The law implies reward signals can only guide behavior during training, not deployment — removing the incentive for reward hacking in production","AI systems optimized against a proxy measure tend to find policies that maximize the proxy while diverging from the underlying goal — and divergence tends to increase with optimization intensity"],a:3},
  {q:"In RLHF, training a reward model on human preference data and then optimizing the policy against it introduces what primary risk?",opts:["The reward model may have lower accuracy than human raters because it is trained on a smaller dataset","Human raters cannot evaluate the reward model's outputs, creating a verification gap in which reward model errors go undetected before influencing the policy","The reward model's architecture is necessarily simpler than the policy, creating a bottleneck on maximum alignment quality","If the policy is optimized too aggressively against the reward model, it may find policies that score highly on the reward model while diverging from what human raters would actually prefer — a form of Goodhart's Law applied to RLHF"],a:3},
  {q:"What is 'sycophancy' as an alignment failure mode in RLHF-trained language models, and why does it arise?",opts:["Sycophancy is a model that memorizes training data rather than generalizing, arising from overfitting during reward model training","Sycophancy arises when the reward model is trained on too little data, causing the policy to give high scores to any output regardless of content","Sycophancy is a hardware-induced failure mode caused by floating-point rounding errors accumulating during reward model training","Sycophancy is where the model learns to produce outputs that human raters rate as satisfying — including confident-sounding but incorrect answers and agreement with stated user beliefs — because these properties correlate with high ratings even when epistemically unjustified"],a:3},
  {q:"Constitutional AI (CAI) uses explicit principles during training. What specific problem in standard RLHF does CAI's self-critique mechanism most directly address?",opts:["CAI eliminates all human involvement in training, making alignment fully automated and scalable","By having the model critique and revise its own outputs against explicit principles, CAI reduces reliance on human raters to catch subtle harms that are difficult for non-expert raters to identify — and makes the value specification more transparent and auditable","CAI solves reward model collapse by replacing the reward model with a fixed set of principles","CAI addresses distributional shift by exposing the model to a wider range of prompts during training than standard RLHF"],a:1},
  {q:"RLAIF uses AI-generated preference labels rather than human-generated ones. Which concern is most specific to RLAIF and does not apply equally to standard RLHF?",opts:["RLAIF is computationally more expensive than RLHF, making it impractical without very large compute budgets","RLAIF cannot be applied to open-ended generation tasks — it is limited to classification and ranking where AI evaluators produce well-calibrated judgments","RLAIF produces reward models that are less accurate on average than RLHF because AI raters have lower inter-rater reliability","The AI system providing feedback in RLAIF may have biases or failure modes amplified in the model being trained — particularly if the feedback model and trained model share architectural similarities or training data"],a:3},
  {q:"The 'superposition hypothesis' in mechanistic interpretability claims what?",opts:["Neural networks represent each feature using a dedicated neuron — larger models are more interpretable because they have more neurons for feature representation","The superposition hypothesis proposes that neural networks learn hierarchical feature representations where each layer represents features at a progressively higher level of abstraction","Models represent more features than they have neurons by encoding multiple features in overlapping linear combinations of neuron activations — making individual neuron interpretation difficult","Neural networks in superposition mode encode the same feature redundantly across many neurons, making models robust to neuron dropout but opaque"],a:2},
  {q:"A 'circuit' in the mechanistic interpretability framework refers to which of the following?",opts:["A hardware component in the AI accelerator responsible for computing a specific operation like matrix multiplication","A formal specification of the model's intended behavior that can be checked against its actual outputs through automated testing","A training curriculum that exposes the model to a structured sequence of examples to produce a specific internal representation","A subgraph of the model's computational graph — a set of weights, attention heads, and activation functions — that implements a specific identifiable computation or behavior"],a:3},
  {q:"Schaeffer et al. (2023) argued that many apparently emergent capabilities could be explained by which mechanism?",opts:["The emergent capabilities identified by Wei et al. were hallucinated — measurement artifacts from errors in the BIG-Bench harness since corrected","When evaluation metrics are discontinuous — such as binary correct/incorrect — smooth underlying capability improvement can produce apparent phase transitions in the metric, making gradual progress look like sudden emergence","Emergent capabilities appear because larger models have seen more training data — they are data-driven, not scale-driven","The 'mirage' of emergence arises from using different model families across size ranges, so phase transitions reflect architectural discontinuities rather than genuine scaling effects"],a:1},
  {q:"Why does the possibility of emergent capabilities create a specific problem for 'evaluate before you deploy' safety strategies?",opts:["Emergent capabilities appear randomly across all model sizes, making evaluations at any fixed size unreliable","Evaluation methodologies cannot identify capabilities the model has not yet been prompted to use, so even large-scale red-teaming cannot detect dormant capabilities","Emergent capabilities always appear at exactly the scale being deployed, so no pre-deployment window exists","If a dangerous capability only emerges above a scale threshold, evaluations on smaller models will not detect it — the model passes evaluation precisely because the capability does not yet exist"],a:3},
  {q:"The EU AI Act uses a compute threshold of 10^25 FLOPS to trigger additional regulatory requirements. What is the primary governance rationale for a compute threshold rather than a direct capability assessment?",opts:["10^25 FLOPS was determined to be the precise threshold above which dangerous AI capabilities reliably emerge, making it technically accurate","The compute threshold was chosen to exempt European companies from the most stringent requirements while imposing them on US and Chinese competitors","Training compute is the only factor determining model capability, so compute thresholds directly measure risk without additional evaluation","Compute is used as a proxy because it is objectively measurable and administratively tractable — regulators can audit training records, whereas directly assessing dangerous capabilities requires technical expertise they cannot currently guarantee"],a:3},
  {q:"Anthropic's Responsible Scaling Policy (RSP) uses 'AI Safety Levels' (ASLs) modeled on biosafety levels. What is the core operational commitment of the RSP?",opts:["Anthropic commits to publishing all safety evaluation results publicly regardless of competitive implications","Anthropic commits to sharing all pre-deployment safety data with the UK AI Safety Institute before releasing any model that would trigger a higher ASL","Anthropic commits not to train models above a given ASL threshold unless it has either demonstrated the model does not have triggering dangerous capabilities, or developed and deployed mitigations sufficient to manage the risk at that capability level","Anthropic commits to halting all capability research whenever a model reaches a new ASL level, allowing safety research to catch up"],a:2},
  {q:"The 'open-source governance problem' in AI policy refers to which specific challenge?",opts:["Open-source AI development communities lack organizational resources to conduct meaningful safety evaluations","Open-source licensing agreements generally prohibit commercial use, limiting economic incentives for safety investment compared to proprietary models","Open-source AI is developed by geographically distributed teams, making it legally ambiguous which national regulations apply","Once model weights are publicly released, they cannot be recalled or restricted — and the EU AI Act's framework targets providers, not individual users, leaving no effective enforcement mechanism for open-source deployments in harmful applications"],a:3},
  {q:"In AI biosecurity assessments, 'uplift' measures which of the following?",opts:["The total number of dangerous biological facts a model provides when queried directly against a standard set of questions","The improvement in biology benchmark performance produced by each additional doubling of training compute","The additional compute required to fine-tune a model into one that complies with dangerous biological information requests","The degree to which an AI system increases a would-be actor's probability of successfully developing a dangerous biological agent relative to their baseline probability without AI assistance"],a:3},
  {q:"The 'lock-in problem' in catastrophic AI risk refers to which scenario?",opts:["The technical challenge of preventing a trained model's weights from being modified after deployment","A cybersecurity failure where an AI system gains control of its host infrastructure and prevents administrators from shutting it down","A scenario in which an AI-enabled power concentration becomes so entrenched that the institutional and political mechanisms for challenging or reversing it are themselves disabled, making the concentration self-perpetuating","The regulatory challenge of preventing AI companies from locking users into proprietary platforms that stifle competition"],a:2},
  {q:"What distinguishes 'misuse risk' from 'misalignment risk' and why does this distinction matter for safety interventions?",opts:["Misuse risk is near-term and misalignment risk is long-term — the distinction matters because near-term risks affect living people while long-term risks are probabilistic and hypothetical","Misuse and misalignment risk are effectively identical — any sufficiently capable AI that causes harm is implicitly misused by someone in the causal chain","In misuse risk, the AI functions as designed but is used by a bad actor; in misalignment risk, the AI behaves contrary to the intentions of its operators. The distinction matters because misuse calls for access controls while misalignment calls for technical alignment research","Misuse risk affects individuals while misalignment risk affects entire societies — the distinction is one of scale, not mechanism"],a:2},
  {q:"The 'debate' technique proposed by Irving and Christiano as a scalable oversight method addresses which specific limitation of direct human evaluation?",opts:["Human evaluators are too slow to keep pace with AI output generation rates — debate introduces an asynchronous process that can be conducted offline","Debate addresses sycophancy by having two AI systems argue against each other, preventing either from simply agreeing with the human evaluator","Debate is a method for aligning AI with diverse stakeholder preferences by having representatives with different values argue for preferred outcomes","As AI systems become capable of producing outputs that exceed human ability to independently verify, debate allows humans to evaluate which of two competing AI arguments is stronger — a task that may remain tractable even when the underlying problem exceeds human ability to solve"],a:3},
  {q:"Compute governance proposals envision hardware-level reporting built into advanced AI chips. What is the primary governance function this would serve?",opts:["Hardware reporting would allow chip manufacturers to remotely disable chips being used for prohibited applications — enforcement that export controls alone cannot achieve","The primary function is to verify AI companies are accurately reporting compute usage for tax purposes, since AI training runs represent significant capital expenditure","Hardware reporting would allow governments to assess the total global compute dedicated to AI training, providing data to calibrate export control thresholds as chip performance improves","By having chips record and report the existence of large training runs above specified thresholds, governments would gain visibility into frontier AI development that voluntary reporting frameworks cannot guarantee — enabling oversight without requiring access to model weights"],a:3},
  {q:"The claim that 'safety and capability research are not fundamentally in tension' is best supported by which observation?",opts:["Frontier AI labs have consistently demonstrated that removing safety training improves performance on all standard capability benchmarks, suggesting safety training is a net capability cost","Safety and capability research use completely different tools and methods, so investment in one has no crowding-out effect on the other — they are complementary by default","The claim is not well-supported empirically — major AI labs report significant capability costs from safety training, and the claim is primarily made by safety researchers to attract capability-focused talent and funding","Interpretability research, evaluation methodology, and robustness research serve both safety and capability goals simultaneously — understanding how models work and fail is valuable for both agendas"],a:3}
];
let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='SAF-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{safetyCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'AI Safety and Alignment — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'You\'ve demonstrated a thorough understanding of AI Safety and Alignment. Your certificate has been issued.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
