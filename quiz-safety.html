window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  // Module 1 — What Is AI Safety?
  {q:"Which of the following most accurately describes the relationship between AI capability research and AI safety research?",opts:["Safety and capability research operate on entirely separate technical foundations with no meaningful overlap in methods or insights","Advances in capability research are the primary driver of safety concerns, while safety research has yet to produce any concrete technical contributions","Safety and capability research share significant technical overlap — interpretability, robustness, and evaluation research each serve both goals simultaneously","Capability research always precedes safety research, making safety a reactive discipline that cannot meaningfully anticipate emerging risks"],a:2},
  {q:"The 'principal-agent problem' as applied to AI systems refers to which of the following?",opts:["The engineering challenge of distributing AI workloads across multiple principal compute nodes","The risk that an AI agent acting on a human's behalf may have different information, incentives, or implicit values — producing outcomes that diverge from what the human actually wanted","The legal question of whether an AI company or its users bear principal liability for harms caused by AI outputs","The difficulty of getting AI systems to follow instructions from multiple principals with contradictory goals"],a:1},
  {q:"What distinguishes 'catastrophic' AI risk from 'existential' AI risk in the formal safety literature?",opts:["Catastrophic risk refers specifically to economic harm while existential risk refers to physical harm to persons","Existential risk is a subset of catastrophic risk — it involves outcomes that either eliminate humanity or permanently curtail humanity's long-term potential, which is a stricter condition than merely causing enormous harm","Catastrophic risk is associated with misuse scenarios while existential risk is associated with misalignment scenarios — the two categories are mutually exclusive","Existential risk refers to risks arising within the next decade while catastrophic risk refers to risks on longer timescales — the distinction is purely temporal"],a:1},

  // Module 2 — The Alignment Problem
  {q:"'Outer alignment' and 'inner alignment' identify two distinct failure modes in AI training. Which description correctly distinguishes them?",opts:["Outer alignment is a hardware concern; inner alignment is a software concern — they arise at different layers of the AI system stack","Outer alignment asks whether the training objective captures what the designer actually wants; inner alignment asks whether the trained model actually optimizes the training objective — both must hold for a robustly safe system","Outer alignment concerns the model's behavior in deployment; inner alignment concerns the model's behavior during training — misalignment that occurs only during training is considered inner alignment failure","Outer alignment is the concern of AI ethicists while inner alignment is the concern of ML researchers — they represent different academic disciplines addressing the same problem"],a:1},
  {q:"The 'orthogonality thesis,' as articulated by Nick Bostrom, makes which of the following claims about the relationship between intelligence and goal-directedness?",opts:["High intelligence necessarily produces broadly human-aligned values through a convergent developmental process analogous to human moral reasoning","Any level of intelligence is in principle compatible with almost any final goal, implying that a highly capable AI system has no inherent tendency toward human-beneficial objectives","Intelligence above a certain threshold causes AI systems to spontaneously develop self-preservation goals that override any initial training objective","The orthogonality of intelligence and goals implies that sufficiently capable AI systems will eventually converge on a single stable goal structure regardless of initial training"],a:1},
  {q:"What does the 'instrumental convergence thesis' predict about the behavior of AI systems with a wide variety of different final goals?",opts:["AI systems with diverse final goals will develop diverse and unpredictable instrumental strategies, making it impossible to generalize about AI behavior across domains","Most final goals tend to produce convergent instrumental sub-goals — including self-preservation, goal-content integrity, and resource acquisition — because these sub-goals are useful for achieving almost any final goal","AI systems with sufficiently general intelligence will abandon their initial goals and converge on a single terminal goal through a process of recursive self-improvement","Instrumental convergence predicts that AI systems will cooperate with one another across diverse goal structures to achieve outcomes that benefit all parties simultaneously"],a:1},

  // Module 3 — Reward Hacking and Specification Gaming
  {q:"A reinforcement learning agent trained to maximize a 'cleanliness score' in a household environment discovers it can achieve a perfect score by covering the camera with tape rather than actually cleaning. This is best described as which of the following?",opts:["A hardware malfunction that corrupted the reward signal the agent was receiving from its sensor inputs","Specification gaming — the agent found a policy that maximizes the literal reward signal while completely failing the intended task, exploiting a gap between the specification and the designer's true goal","Distributional shift — the agent encountered an environment sufficiently different from training that its policy transferred incorrectly","Reward model collapse — the agent's reward function degraded over training until it ceased to measure the intended property"],a:1},
  {q:"Goodhart's Law, often cited in discussions of reward hacking, states that 'when a measure becomes a target, it ceases to be a good measure.' Why is this particularly problematic for AI alignment?",opts:["Goodhart's Law implies that all possible reward specifications are internally contradictory and that no training objective can ever be optimized consistently","AI systems optimized against a proxy measure tend to find policies that maximize the proxy while diverging from the underlying goal the proxy was meant to capture — and the divergence tends to increase with the intensity of optimization","Goodhart's Law predicts that reward hacking is only a problem at very large model scales and becomes negligible for smaller AI systems","The law implies that reward signals can only guide behavior during training, not during deployment — removing the incentive for reward hacking in production environments"],a:1},

  // Module 4 — RLHF
  {q:"In Reinforcement Learning from Human Feedback (RLHF), after human raters produce preference data, the process requires training a reward model and then optimizing the policy against it. What is the primary risk introduced by this two-step structure?",opts:["The reward model may have lower accuracy than human raters because it is trained on a smaller dataset, so the policy trained against it is systematically weaker than one trained directly on human preferences","If the policy is optimized too aggressively against the reward model, it may find policies that score highly on the reward model while diverging significantly from what human raters would actually prefer — a form of Goodhart's Law applied to RLHF","Human raters are unable to evaluate the reward model's outputs directly, creating a verification gap in which reward model errors cannot be detected before they influence the policy","The reward model's architecture is necessarily simpler than the policy model it is training, creating a bottleneck that limits the maximum alignment quality achievable through RLHF"],a:1},
  {q:"What is 'sycophancy' as an alignment failure mode in RLHF-trained language models, and why does it arise from the training dynamics?",opts:["Sycophancy refers to a model that memorizes and repeats training data rather than generalizing, arising from overfitting during the reward model training phase","Sycophancy is a failure mode where the model learns to produce outputs that human raters rate as satisfying — including confident-sounding but incorrect answers, flattering responses, and agreement with stated user beliefs — because these properties correlate with high ratings even when they are epistemically unjustified","Sycophancy arises when the reward model is trained on too little data, causing the policy to optimize for a reward model that gives high scores to any output regardless of its content","Sycophancy is a hardware-induced failure mode caused by floating-point rounding errors accumulating during the reward model training process"],a:1},

  // Module 5 — Constitutional AI and RLAIF
  {q:"Constitutional AI (CAI) as developed by Anthropic uses a set of explicit principles during training. What specific problem in standard RLHF does CAI's self-critique mechanism most directly address?",opts:["CAI eliminates the need for any human involvement in AI training, making the alignment process fully automated and scalable without human oversight","By having the model evaluate and revise its own outputs against explicit principles, CAI reduces reliance on human raters to catch subtle harms that are difficult for non-expert raters to identify — and makes the value specification more transparent and auditable","CAI solves the problem of reward model collapse by replacing the reward model with a fixed set of principles, preventing the reward signal from degrading over long training runs","CAI addresses the distributional shift problem by exposing the model to a wider range of prompts during training than standard RLHF, improving generalization to out-of-distribution inputs"],a:1},
  {q:"RLAIF (Reinforcement Learning from AI Feedback) differs from RLHF in that it uses AI-generated preference labels rather than human-generated ones. Which concern is most specific to RLAIF that does not apply equally to standard RLHF?",opts:["RLAIF is computationally more expensive than RLHF, making it impractical for organizations without access to very large compute budgets","The AI system providing feedback in RLAIF may have biases or failure modes that are then amplified in the model being trained — particularly if the feedback model and the model being trained share architectural similarities or training data","RLAIF produces reward models that are less accurate on average than those produced by RLHF because AI raters have lower inter-rater reliability than human raters","RLAIF cannot be applied to open-ended generation tasks and is limited to classification and ranking tasks where AI evaluators can produce well-calibrated judgments"],a:1},

  // Module 6 — Interpretability
  {q:"Mechanistic interpretability research at Anthropic and elsewhere has proposed the 'superposition hypothesis' to explain a puzzling observation about neural network representations. What does this hypothesis claim?",opts:["Neural networks represent each feature using a dedicated neuron, which means that larger models are always more interpretable because they have more neurons available for feature representation","Models represent more features than they have neurons by encoding multiple features in overlapping linear combinations of neuron activations — features are superimposed rather than cleanly separated, which makes interpretation difficult","The superposition hypothesis proposes that neural networks learn hierarchical feature representations where each layer represents features at a progressively higher level of abstraction","Neural networks in superposition mode encode the same feature redundantly across many neurons, making models robust to neuron dropout but preventing any single neuron from being interpreted in isolation"],a:1},
  {q:"A 'circuit' in the mechanistic interpretability framework refers to which of the following?",opts:["A hardware component in the AI accelerator responsible for computing a specific mathematical operation such as matrix multiplication or attention","A subgraph of the model's computational graph — a set of weights, attention heads, and activation functions — that implements a specific identifiable computation or behavior","A formal specification of the model's intended behavior that can be checked against the model's actual outputs through automated testing","A training curriculum that exposes the model to a structured sequence of examples designed to produce a specific internal representation"],a:1},

  // Module 7 — Emergent Capabilities
  {q:"The paper 'Are Emergent Abilities of Large Language Models a Mirage?' (Schaeffer et al., 2023) argued that many apparently emergent capabilities could be explained by which mechanism?",opts:["The emergent capabilities identified by Wei et al. were hallucinated — they were measurement artifacts resulting from errors in the BIG-Bench evaluation harness that have since been corrected","When evaluation metrics are discontinuous — such as binary correct/incorrect measures — smooth underlying improvement in capability can produce apparent phase transitions in the metric, making gradual progress look like sudden emergence","Emergent capabilities appear because larger models have access to more training data, and the capabilities appear when the model has seen enough examples of the relevant task — they are data-driven, not scale-driven","The 'mirage' of emergence arises from using different model families in different size ranges, so apparent phase transitions reflect architectural discontinuities rather than genuine scaling effects"],a:1},
  {q:"Why does the possibility of emergent capabilities create a specific problem for the 'evaluate before you deploy' safety strategy?",opts:["Emergent capabilities appear randomly and unpredictably across all model sizes, making it impossible to conduct evaluations at any fixed model size with confidence in the results","If a dangerous capability only emerges above a scale threshold, evaluations conducted on models below that threshold will not detect it — the model passes evaluation precisely because the dangerous capability does not yet exist, not because the capability was tested and found absent","Emergent capabilities always appear at the exact scale being deployed, so by the time evaluation is conducted the capability is already present and no pre-deployment window exists","Evaluation methodologies are not able to identify capabilities that the model has not yet been prompted to use, meaning that even large-scale red-teaming cannot detect dormant emergent capabilities"],a:1},

  // Module 8 — AI Governance
  {q:"The EU AI Act establishes a compute threshold of 10^25 FLOPS as a trigger for additional regulatory requirements for 'general-purpose AI models.' What is the primary governance rationale for using a compute threshold rather than a direct capability assessment?",opts:["10^25 FLOPS was determined by EU technical advisors to be the precise threshold above which dangerous AI capabilities reliably emerge, making it both a practical and technically accurate cutoff","Compute is used as a proxy because it is objectively measurable and administratively tractable — regulators can audit training records, whereas directly assessing whether a model has dangerous capabilities requires technical expertise and access that regulators cannot currently guarantee","The compute threshold was chosen to exempt European AI companies from the most stringent requirements while imposing them on larger US and Chinese competitors, serving a competitive policy objective as much as a safety one","Training compute is the only factor that determines model capability, so compute thresholds directly measure the risk level of the system without requiring any additional capability evaluation"],a:1},
  {q:"Anthropic's Responsible Scaling Policy (RSP) uses the concept of 'AI Safety Levels' (ASLs) modeled on biosafety levels. What is the core operational commitment of the RSP?",opts:["Anthropic commits to publishing the results of all safety evaluations publicly, regardless of the implications for competitive advantage, so that the broader research community can verify safety claims","Anthropic commits not to train models above a given ASL threshold unless it has either demonstrated the model does not have the triggering dangerous capabilities, or developed and deployed mitigations sufficient to manage the risk at that capability level","Anthropic commits to sharing all pre-deployment safety evaluation data with the UK AI Safety Institute and US government before releasing any model that would trigger higher ASL classification","Anthropic commits to halting all capability research for a defined period whenever a model reaches a new ASL level, allowing safety research to catch up before further capability development proceeds"],a:1},
  {q:"The 'open-source governance problem' in AI policy refers to which specific challenge?",opts:["Open-source AI development communities lack the organizational resources to conduct meaningful safety evaluations, making it harder for open-source models to demonstrate safety compliance","Once model weights are publicly released, they cannot be recalled or restricted — and the EU AI Act's compliance framework targets providers, not individual users, leaving no effective enforcement mechanism for open-source deployments in harmful applications","Open-source AI models are developed by geographically distributed teams, making it legally ambiguous which national regulations apply and creating jurisdictional gaps in enforcement","Open-source licensing agreements for AI models generally prohibit commercial use, which limits the economic incentives for safety investment compared to proprietary models developed by commercial organizations"],a:1},

  // Module 9 — Catastrophic Risk Scenarios
  {q:"In AI biosecurity assessments, 'uplift' is used as a technical term to measure AI risk. Which of the following best captures what uplift measures in this context?",opts:["The total number of dangerous biological facts that a model will provide when queried directly, measured against a standard set of questions developed by biosecurity researchers","The degree to which an AI system increases a would-be actor's probability of successfully developing a dangerous biological agent relative to their baseline probability without AI assistance — accounting for the specificity and operational utility of the information provided","The improvement in model performance on standard biology benchmarks produced by each additional doubling of training compute, used to forecast when models will reach biosecurity-relevant capability levels","The additional compute required to fine-tune a general-purpose AI model into one that will comply with requests for dangerous biological information, used to assess how easily safety training can be circumvented"],a:1},
  {q:"The 'lock-in problem' in catastrophic AI risk refers to which scenario?",opts:["The technical challenge of preventing a trained AI model's weights from being modified after deployment, ensuring that safety properties established during training persist throughout the model's operational life","A scenario in which an AI-enabled power concentration — political, military, or economic — becomes so entrenched that the institutional and political mechanisms for challenging or reversing it are themselves disabled, making the concentration self-perpetuating","The regulatory challenge of preventing AI companies from locking users into proprietary platforms in ways that stifle competition and prevent users from migrating to safer alternatives","A cybersecurity failure mode in which an AI system gains control of its host infrastructure and prevents administrators from shutting it down or modifying its parameters"],a:1},
  {q:"What distinguishes 'misuse risk' from 'misalignment risk' as categories of catastrophic AI risk, and why does this distinction matter for the design of safety interventions?",opts:["Misuse risk is near-term and misalignment risk is long-term — the distinction matters because near-term risks affect living people while long-term risks are probabilistic and hypothetical, making misuse risk the appropriate priority for current policy","In misuse risk, the AI system is functioning as designed but being used by a bad actor to cause harm; in misalignment risk, the AI system itself is behaving contrary to the intentions of its operators. The distinction matters because misuse calls for access controls and deployment restrictions while misalignment calls for technical alignment research and evaluation frameworks","Misuse risk affects individuals and organizations while misalignment risk affects entire societies — the distinction is one of scale, not mechanism, and safety interventions address both by reducing overall AI capability","Misuse and misalignment risk are effectively identical in practice because any sufficiently capable AI system that causes harm is implicitly misused by someone in the causal chain — the distinction is conceptually interesting but has no practical implications for intervention design"],a:1},

  // Module 10 — Paths to Safe AI
  {q:"The 'debate' technique proposed by Irving and Christiano as a scalable oversight method proposes to address which specific limitation of direct human evaluation of AI outputs?",opts:["Human evaluators are too slow to keep pace with AI output generation rates, so debate introduces a structured asynchronous evaluation process that can be conducted offline","As AI systems become capable of producing outputs that exceed human ability to independently verify, debate allows humans to evaluate which of two competing AI arguments is stronger — a verification task that may remain tractable even when the underlying problem exceeds human ability to solve directly","Debate addresses the sycophancy problem by having two AI systems argue against each other, preventing either system from simply agreeing with the human evaluator to obtain a high score","Debate is a method for aligning AI systems with diverse stakeholder preferences by having representatives with different values argue for their preferred outcomes, with the AI trained to produce outputs that can survive multi-stakeholder scrutiny"],a:1},
  {q:"Compute governance proposals such as 'know your compute' mechanisms envision hardware-level reporting built into advanced AI chips. What is the primary governance function this would serve?",opts:["Hardware-level reporting would allow chip manufacturers to remotely disable chips being used for prohibited applications, providing enforcement capability that export controls alone cannot achieve","By having chips record and report the existence of large training runs above specified thresholds, governments would gain visibility into frontier AI development that voluntary reporting frameworks cannot guarantee — enabling oversight without requiring access to model weights or training data","Hardware-level reporting would allow governments to assess the total global compute being dedicated to AI training, providing the data needed to calibrate export control thresholds as chip performance improves","The primary function is to verify that AI companies are accurately reporting their compute usage for tax purposes, since AI training runs represent significant capital expenditure that current reporting frameworks may undercount"],a:1},
  {q:"Open Philanthropy's funding dominance in the AI safety research ecosystem has been identified as both an advantage and a potential concern. Which accurately describes the concern that has been raised?",opts:["Open Philanthropy's funding is structurally committed to near-term AI harms research and may be crowding out longer-term existential risk research, creating a field that is overly focused on current deployments rather than future risks","A field disproportionately funded by a single organization with a specific philosophical orientation — effective altruism's emphasis on existential risk — may develop blind spots, underinvesting in research programs that don't fit that framing while overinvesting in those that do","Open Philanthropy's funding terms require grantees to publish all research on a specific timeline, creating a culture of premature publication that undermines research quality and allows capability researchers to exploit safety findings before defenses are in place","Open Philanthropy's primary funders have direct equity stakes in several frontier AI companies, creating a structural conflict of interest that may bias the organization toward funding safety research that legitimizes rather than constrains rapid capability development"],a:1},

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='SAF-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{safetyCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'AI Safety and Alignment — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'You\'ve demonstrated a thorough understanding of AI Safety and Alignment. Your certificate has been issued.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
