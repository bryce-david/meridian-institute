<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-48.png" sizes="48x48" type="image/png">
<link rel="apple-touch-icon" href="/favicon-48.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Machine Learning — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#065F46;--accent-dim:rgba(6,95,70,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#064e3b;--accent-dim:rgba(6,78,59,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(6,95,70,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
<style>@media(max-width:480px){.nav-divider{display:none}.nav-left{gap:8px}}</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>Machine Learning</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"A fraud detection model achieves 99% accuracy on 1%-fraud data but catches almost no fraud in production. What is the most likely explanation?",opts:["The training data was not shuffled before splitting","The decision threshold was set too high, flagging only extreme cases","Accuracy is a misleading metric here — the model predicts 'not fraud' for everything and is trivially 99% accurate","The model overfit to the test set because accuracy was the training objective"],a:2},
  {q:"Validation loss stopped falling at epoch 15 and has since climbed to 0.40, while training loss is 0.05 at epoch 50. What should the team do?",opts:["Stop training at the epoch of minimum validation loss; the model began overfitting after epoch 15","Train for more epochs — the plateau is temporary","Increase model capacity to fix what the validation trend is signaling as underfitting","Lower the learning rate — gradient explosion destabilized training"],a:0},
  {q:"A drug discovery model performs well on a random 20% test split but fails on molecules with novel scaffolds. What was the evaluation flaw?",opts:["The test set was too small to represent chemical space","Random splitting allows structurally similar molecules in both sets — a scaffold-based split is required to measure generalization","The architecture is too simple for novel scaffolds regardless of split","The dataset needed augmentation before splitting"],a:1},
  {q:"A hospital readmission regression model has low overall MSE but fails on the highest-risk patients. What evaluation design flaw caused this?",opts:["MSE weights high-volume low-risk patients more heavily, masking poor performance on rare critical cases","The architecture overfit to low-risk patients","The training set contained no high-risk patients","A regression objective is inherently wrong for predicting readmission risk"],a:0},
  {q:"After fine-tuning on customer support transcripts, a model's general reasoning benchmarks drop sharply. What is this phenomenon called?",opts:["Overfitting — the model memorized individual transcripts","The transcripts contained factual errors now embedded parametrically","Catastrophic forgetting — fine-tuning on a narrow domain overwrote general knowledge in the original weights","Fine-tuning reduced the model's effective context window"],a:2},
  {q:"A lane-detection model trained in sunny California fails in rainy Seattle. The team wants to retrain on Seattle data. What would a researcher suggest instead?",opts:["Collect more California data to build a stronger base","Train on diverse weather conditions to build robustness to distribution shift broadly, not just one new domain","Use a larger model with enough capacity for both environments","Deploy a rule-based fallback for rain since ML can't handle weather variability"],a:1},
  {q:"A recommender scores AUC 0.91 on offline historical data but shows no lift in an A/B test. What is most likely?",opts:["The A/B test was underpowered","Production traffic includes users absent from historical data","Offline metrics optimize for predicting past behavior — online engagement is a different objective and the two can decouple","AUC above 0.85 always signals data leakage in recommender systems"],a:2},
  {q:"A churn model includes 'days_since_last_login', which is only populated after a customer has churned. The model achieves 98% accuracy. What is the fundamental error?",opts:["The feature violates logistic regression's independence assumption","This is data leakage — the feature is unavailable at prediction time, making the model useless in production","The feature has too many missing values","The model overfit to one overly predictive feature"],a:1},
  {q:"A binary classifier trained 90% class-A / 10% class-B has high precision on A but poor recall on B. What is the most direct fix?",opts:["Deepen the model to improve minority-class capacity","Apply class weighting or oversample class B to correct the training imbalance","Lower the threshold for class B to trade precision for recall","Collect more class-A data to strengthen the model overall"],a:1},
  {q:"Six months after deploying a 500-tree gradient-boosting loan model, a regulator demands an explanation for a specific denial. What is the core problem?",opts:["The model cannot be retrained without overwriting historical decisions","Stochastic subsampling makes results non-reproducible under audit","Tree ensembles lack built-in interpretability — post-hoc tools like SHAP are required to attribute decisions to features","Accuracy degrades over 6 months, making the original prediction unverifiable"],a:2},
  {q:"Model A: 85% accuracy, low cross-validation variance. Model B: 88% accuracy, high CV variance. Which should be deployed?",opts:["Model B — higher accuracy always wins","Model A — high CV variance in Model B signals sensitivity to data splits and likely weaker generalization","Model B — high variance reflects a richer hypothesis space","Model A only if compute is limited; otherwise accuracy always wins"],a:1},
  {q:"A ResNet-50 trained from scratch on 5,000 medical images has poor test performance. Why would a pretrained ImageNet ResNet-50 help, despite ImageNet having no medical images?",opts:["ImageNet pretraining directly encodes tissue-texture recognition","Transfer learning eliminates the need for labeled medical data","Low-level features like edges and textures transfer across domains — fine-tuning from pretrained weights is far more sample-efficient than random initialization","Pretrained models process higher-resolution inputs during fine-tuning"],a:2},
  {q:"A cancer treatment response model achieves 80% overall accuracy but consistently under-predicts response for Black patients. What is most likely causing this?",opts:["The architecture is too simple for biological complexity across demographics","The training data underrepresented Black patients, so the model learned less accurate patterns for that group","Accuracy is insensitive to demographic disparities — a different metric would show no gap","Aggregate training data cannot capture individual-level treatment variation"],a:1},
  {q:"A recommender's precision@10 is excellent but users report repetitive recommendations. What evaluation gap does this reveal?",opts:["Precision@10 should be replaced with NDCG to capture ranking quality","Precision@10 measures relevance but not diversity — the model can ace it by recommending variants of a single popular item","User surveys are anchored to salient items, inflating perceived repetitiveness","Precision@10 only evaluates the final slot, missing poor early recommendations"],a:1},
  {q:"An object detection model needs to drop from 4GB to under 500MB for smartphone deployment. What is the appropriate technical approach?",opts:["Quantize weights from float32 to int8 and prune low-importance weights to compress the model","Reduce the training dataset so the checkpoint is smaller","Switch to a classical ML model that inherently uses less memory","Retrain with a smaller learning rate so weights converge to smaller absolute magnitudes"],a:0},
  {q:"A language model achieves state-of-the-art accuracy on a reading comprehension benchmark. The researcher reveals the test set appeared in the model's training data. What is this problem called?",opts:["Dataset shift — the benchmark aged out of alignment with current language use","Benchmark contamination — the score measures memorization, not generalization, invalidating it as a capability estimate","Evaluation overfitting — testing too many model variants on one benchmark","Confirmation bias — the model was trained to affirm its own prior answers"],a:1},
  {q:"A training run's loss plateaus at epoch 10 and stays flat for 20 more epochs. What should be investigated first?",opts:["Full convergence to the global minimum — stop training","Batch normalization layers blocking gradient flow — remove them","Learning rate may be too small or the model hit a local minimum — try a scheduler, warmup, or new initialization","Stale optimizer momentum resisting further updates"],a:2},
  {q:"Validation perplexity decreases steadily but a factual accuracy benchmark stays flat. What does this indicate?",opts:["Perplexity and factual accuracy are equivalent — the benchmark is miscalibrated","The model improves at fluent language modeling without improving factual knowledge — these two objectives partially decouple","Factual questions in the validation set make the benchmark indirectly measure perplexity","Lower perplexity always yields higher factual accuracy since fluency and factual grounding co-occur"],a:1},
  {q:"Epoch 30: training 72%, validation 71%. Epoch 100: training 99%, validation 68%. Why would adding dropout help?",opts:["Dropout randomly deactivates neurons during training, preventing co-adaptation and reducing overfitting of the training set","Dropout adds gradient noise to help escape the training plateau at 99%","Dropout reduces parameter count, directly lowering inference memory use","Dropout lets subnetworks specialize, further boosting training accuracy"],a:0},
  {q:"Feature selection ranks 500 features by correlation with the target label using the full dataset, then splits into train/test. A statistician flags a methodological error. What is it?",opts:["Correlation is the wrong metric — mutual information should be used instead","Feature selection used full-dataset labels before splitting, leaking test information and inflating evaluation metrics","20 selected features is insufficient — regularization should select from all 500","Proprietary selection algorithms cannot be externally validated and shouldn't be used in production"],a:1},
  {q:"A predictive maintenance model has 90% precision and 60% recall. Operations managers say too many failures are missed. What single change addresses this?",opts:["Add more sensor features to give the model richer signal for detecting failures","Switch to AUC-ROC since it's better suited to imbalanced data","Retrain on more data — 60% recall means insufficient training examples for rare failures","Lower the classification threshold to flag more machines as at-risk, trading some precision for higher recall"],a:3},
  {q:"A generative image model has an excellent FID score, but domain experts say all images look nearly identical. What does this reveal about FID?",opts:["FID is miscalculated — a correct implementation penalizes low diversity proportionally","The experts are applying qualitative standards to a metric not designed for diversity assessment","FID above 10 always indicates mode collapse regardless of visible diversity","FID measures distributional similarity and can be fooled by mode collapse when generated images closely match a real-data subset"],a:3},
  {q:"Adam converges faster and achieves lower training loss than SGD, but SGD's model generalizes better on the held-out test set. How is this possible?",opts:["Adam always outperforms SGD — there is likely an implementation error in the SGD baseline","Adam's higher default learning rate causes aggressive early overfitting that SGD avoids","SGD's noisier gradient updates act as implicit regularization, often finding flatter minima that generalize better despite higher training loss","The test set is from a different time period, making the comparison inherently unfair"],a:2},
  {q:"A computer vision model drops from 97% to 71% accuracy when deployed at a hospital with a different scanner. What type of failure is this?",opts:["Data leakage — the same patients appeared in both train and test sets","Distribution shift — the new scanner produces images with different pixel statistics than the training data","Overfitting — the model memorized training images rather than generalizable features","Underfitting — the architecture was too shallow to learn robust representations"],a:1},
  {q:"Scaling laws show validation loss decreasing predictably as a power law of compute. A team uses this to justify training a 10x larger model. What risk does the scaling law not inform them about?",opts:["Whether the larger model will overfit without proportionally more data","Whether the power law holds at that scale given prior estimates","Whether hardware can support the memory footprint of the larger model","Whether the larger model will exhibit emergent unsafe behaviors not present at smaller scale — scaling laws on loss do not predict capability emergence"],a:3}
];
let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='ML-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{mlCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'Machine Learning — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of Machine Learning.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
