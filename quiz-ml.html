<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#065F46;--accent-dim:rgba(6,95,70,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#064e3b;--accent-dim:rgba(6,78,59,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}

  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(6,95,70,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}

  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"A fraud detection model achieves 99% accuracy on a dataset where 1% of transactions are fraudulent. The team deploys it but finds it catches almost no fraud in production. What is the most likely explanation?",opts:["The model overfit to the test set because accuracy was used as the evaluation metric during training","The model learned to predict 'not fraud' for every transaction, which trivially achieves 99% accuracy on an imbalanced dataset","The training data was not shuffled, causing the model to only learn from the last 1% of examples","The model's decision threshold was set too high, causing it to flag only extremely obvious fraud cases"],a:1},
  {q:"A computer vision model achieves 97% accuracy on a medical imaging dataset in the lab. When deployed in a different hospital, accuracy drops to 71%. The new hospital uses a different scanner model. What type of failure is this?",opts:["Overfitting — the model memorized the training images rather than learning generalizable features","Distribution shift — the new scanner produces images with different pixel characteristics than the training distribution","Data leakage — the training set contained images from the same patients in the test set","Underfitting — the model's architecture was too shallow to learn robust enough features from medical images"],a:1},
  {q:"A team trains a sentiment classifier. Training loss decreases steadily to 0.05 over 50 epochs. Validation loss decreases until epoch 15, then slowly climbs back to 0.40. What does this pattern indicate and what should be done?",opts:["The model is underfitting — increasing model capacity or training longer would improve validation performance","The model overfit after epoch 15 — training should stop at the epoch of minimum validation loss, using early stopping","The learning rate is too high, causing gradient explosion that destabilizes training after epoch 15","The validation set is too small, causing noisy loss estimates that oscillate around the true generalization performance"],a:1},
  {q:"A researcher trains a drug discovery model on a dataset of 100,000 molecules. They randomly split the data 80/20 into train/test. The model scores extremely well on the test set, but fails when tested on truly novel molecules with different scaffolds. What was wrong with the evaluation?",opts:["The 80/20 split gave the model too little test data to accurately measure generalization performance","Random splitting allows structurally similar molecules to appear in both train and test, leaking information — a scaffold-based split would be more rigorous","The model's architecture is too simple to generalize to novel scaffolds regardless of the split strategy","The dataset is too small for deep learning and should be augmented with synthetic molecules before splitting"],a:1},
  {q:"A team wants to deploy a regression model that predicts hospital readmission risk. During evaluation they notice the model has low mean squared error overall but performs poorly for the highest-risk patients (those most important to flag). What evaluation design flaw caused this?",opts:["MSE averaged over all patients weights high-volume low-risk patients more heavily — masking poor performance on the rare critical cases","The model's architecture is too complex, causing it to fit low-risk patients well while ignoring the sparse high-risk examples","The training set contained no high-risk patients, making it impossible for the model to learn that subgroup","The regression objective should be replaced with a classification objective focused on the high-risk binary label"],a:1},
  {q:"A team fine-tunes a large language model on customer support chat transcripts to improve domain-specific response quality. After fine-tuning, the model is much better at support conversations but its performance on general reasoning benchmarks drops significantly. What phenomenon explains this?",opts:["Overfitting to the fine-tuning dataset caused the model to memorize transcripts rather than learn domain patterns","Catastrophic forgetting — fine-tuning on the narrow domain overwrote general-purpose knowledge encoded in the original weights","The support transcripts contained incorrect information that was incorporated into the model's parametric knowledge","Fine-tuning reduced the model's effective context window, limiting its ability to handle multi-step reasoning chains"],a:1},
  {q:"A self-driving car company trains a lane-detection model that performs excellently in sunny California test data. The model is deployed in rainy Seattle and fails frequently. The engineering team proposes retraining on Seattle data. A researcher proposes a different solution. What would the researcher most likely suggest?",opts:["Collecting more sunny California data so the model's base performance is strong enough to generalize to any condition","Applying domain adaptation or training on diverse weather conditions to make the model robust to distribution shift, not just the specific new domain","Increasing the model size so it has enough capacity to memorize both California and Seattle driving conditions","Deploying a rule-based fallback system for rainy conditions since ML models cannot handle weather variability"],a:1},
  {q:"A recommendation system is evaluated using offline historical click data and achieves an AUC of 0.91. When A/B tested in production, the new model shows no improvement over the old one. What is the most likely explanation?",opts:["The A/B test sample size was too small to detect the 0.91 AUC improvement with statistical significance","Offline evaluation on historical data optimizes for predicting past user behavior, not for improving future engagement — offline and online metrics can decouple","The model overfit to the evaluation set since AUC above 0.85 is always a sign of data leakage in recommendation systems","The production traffic distribution differs from the historical data, causing the model to encounter out-of-vocabulary users"],a:1},
  {q:"A data scientist builds a churn prediction model and includes a feature called 'days_since_last_login' which is only populated after a customer has already churned in the database. The model achieves 98% accuracy. What is the fundamental error?",opts:["The feature is highly correlated with the target variable, which violates the independence assumptions of logistic regression","This is data leakage — the feature encodes information that would not be available at prediction time, making the model useless in production","The feature has too many missing values for the model to learn from it effectively in production scenarios","The model overfit to this single feature since it is too predictive, crowding out other useful signals"],a:1},
  {q:"A team trains a binary classifier with 90% of training examples from class A and 10% from class B. The model consistently achieves high precision on class A but poor recall on class B. What is the most direct intervention?",opts:["Increase the model's depth so it has more capacity to learn the minority class distribution accurately","Apply class weighting or oversampling of class B to correct for the imbalance in the training distribution","Reduce the classification threshold for class B to increase recall at the cost of some precision","Collect more data from class A to further improve the model's confidence and overall accuracy"],a:1},
  {q:"A team deploys a loan approval model. Six months later, a regulator asks them to explain why a specific applicant was denied. The team used a gradient-boosting ensemble with 500 trees. What is the core problem they face?",opts:["Gradient boosting models cannot be retrained without forgetting the denied applicant's case, limiting backward investigation","Tree ensemble models lack interpretability — attributing the denial to specific input features requires post-hoc explainability tools not built into the model","The model's accuracy degrades over 6 months of deployment, making the original decision no longer reproducible","Regulatory audits require deterministic models, and gradient boosting's stochastic subsampling makes results non-reproducible"],a:1},
  {q:"A team is comparing two models: Model A achieves 85% accuracy with low variance across 5-fold cross-validation. Model B achieves 88% accuracy but high variance across folds. They must choose one for deployment. Which should they choose and why?",opts:["Model B, because higher accuracy directly translates to better production performance regardless of validation variance","Model A, because high cross-validation variance in Model B suggests it is sensitive to data splits and may generalize less reliably","Model B, because high variance means it is exploring a richer hypothesis space and has more room for improvement","Model A only if compute is constrained — otherwise Model B's superior accuracy always outweighs stability concerns"],a:1},
  {q:"A text classification model is trained on data from 2020. By 2025, new terminology has emerged in the domain and the model's accuracy has dropped from 91% to 74%. The team wants to update the model with minimal compute. What is the most efficient approach?",opts:["Retrain the entire model from scratch on a new dataset combining 2020 and 2025 examples to avoid catastrophic forgetting","Fine-tune the existing model on a curated dataset of 2025 examples — this requires far less compute than full retraining while updating relevant knowledge","Deploy a retrieval-augmented system that appends 2025 terminology examples to each input at inference time","Apply vocabulary expansion to the tokenizer and retrain only the embedding layer while freezing all other weights"],a:1},
  {q:"A team trains a ResNet-50 image classifier from scratch on a dataset of 5,000 medical images. Training converges but test performance is poor. A colleague suggests using a pretrained ResNet-50 instead. Why would this help despite the pretraining being on ImageNet (natural images, not medical)?",opts:["ImageNet pretraining directly teaches the model to recognize medical patterns since natural images contain tissue-like textures","Low-level features learned on ImageNet (edges, textures, shapes) transfer to medical imaging — fine-tuning these on 5,000 examples is far more efficient than learning from random initialization","Transfer learning bypasses the need for labeled medical images entirely since the pretrained model already encodes diagnostic features","Pretrained models have larger effective context windows, allowing them to process higher-resolution medical images during fine-tuning"],a:1},
  {q:"A machine learning system predicts whether patients will respond to a specific cancer treatment. The model achieves 80% accuracy overall. Doctors notice that it consistently under-predicts response rates for Black patients compared to actual clinical outcomes. What is the most likely cause?",opts:["The model's architecture is too simple to capture the biological complexity of treatment response across demographic groups","The training data likely underrepresented Black patients, causing the model to learn less accurate patterns for that population","The evaluation metric (accuracy) is not sensitive to demographic disparities and a different metric would show no gap","The model was trained on aggregate population data and cannot account for individual-level treatment variation for any patient"],a:1},
  {q:"A company trains a recommender system and evaluates it with precision@10 (how many of the top 10 recommended items are relevant). The metric is excellent. However, user satisfaction surveys show people feel the recommendations are repetitive. What evaluation gap exists?",opts:["Precision@10 is a flawed metric for recommender systems and should be replaced with NDCG which measures ranking quality","Precision@10 measures relevance but not diversity — the model can score perfectly by recommending variants of one popular item","The satisfaction surveys are biased because users anchored on specific items they saw, inflating the reported repetitiveness","Precision@10 evaluates only the 10th recommendation rather than the full list, missing early poor recommendations"],a:1},
  {q:"A team wants to deploy a real-time object detection model on edge devices (smartphones) where GPU memory is limited. Their current model achieves 94% mAP but requires 4GB of memory. They need it under 500MB. What is the appropriate technical approach?",opts:["Reduce the training dataset size to produce a smaller model checkpoint that fits within the memory constraint","Apply model quantization (reducing weight precision from float32 to int8) and pruning (removing low-importance weights) to compress the model","Retrain the model with a smaller learning rate so the weights converge to smaller absolute values and take less memory","Switch from a neural network to a classical ML model such as a random forest which inherently uses less memory"],a:1},
  {q:"A language model is evaluated on a reading comprehension benchmark and achieves state-of-the-art accuracy. A researcher points out that the benchmark's test examples appeared in the model's training data. What is this problem called and why does it matter?",opts:["Confirmation bias — the model was trained to confirm its own prior answers rather than reason from the passage","Benchmark contamination — the model memorized test answers during training, making its benchmark score invalid as a measure of generalization","Evaluation overfitting — training too many model variants and selecting the best one on the benchmark inflates apparent performance","Dataset shift — benchmark data from when the dataset was created no longer matches current language usage patterns"],a:1},
  {q:"A gradient descent training run appears to stall — the loss stops decreasing after 10 epochs and doesn't recover over the next 20 epochs. The validation loss mirrors this plateau. What is the most common cause and first thing to investigate?",opts:["The model has fully converged and is at the global minimum of the loss landscape — training should stop immediately","The learning rate may be too small (stuck in a flat region) or the model has reached a local minimum — trying learning rate warmup, a scheduler, or different initialization could help","Batch normalization layers are preventing gradient flow, requiring them to be removed from the architecture","The optimizer has accumulated stale momentum from early training that is now resisting further parameter updates"],a:1},
  {q:"A team trains a language model and notices that perplexity on the validation set decreases steadily while a separate benchmark of factual accuracy stays flat or worsens. What does this indicate?",opts:["Perplexity and factual accuracy measure the same property — the benchmark is miscalibrated and should be ignored","The model is becoming better at fluent language modeling without necessarily improving or even retaining its factual knowledge — these objectives partially decouple","The validation set contains factual questions, causing the benchmark to measure perplexity indirectly rather than true factual accuracy","Lower perplexity always correlates with higher factual accuracy because fluent text is more likely to be grounded in real-world knowledge"],a:1},
  {q:"A team trains a neural network for 100 epochs. At epoch 30, training accuracy is 72% and validation accuracy is 71%. At epoch 100, training accuracy is 99% and validation accuracy is 68%. A new team member suggests adding dropout. Why would dropout help here?",opts:["Dropout increases training accuracy by allowing different subnetworks to specialize in different aspects of the data","Dropout randomly deactivates neurons during training, acting as a regularizer that prevents co-adaptation of neurons and reduces overfitting of the training data","Dropout reduces the number of parameters in the final model, directly decreasing memory requirements during inference","Dropout adds noise to the loss gradient, helping the optimizer escape the local minimum causing the training accuracy to plateau at 99%"],a:1},
  {q:"A company uses a proprietary feature selection algorithm that picks the top 20 features from 500 candidates based on correlation with the training label. They then train and evaluate a model on this feature set. A statistician flags a methodological error. What is it?",opts:["Using correlation for feature selection is inappropriate — mutual information should always be used for feature relevance ranking","Feature selection was performed using the full dataset before splitting into train/test, leaking test label information into feature selection and inflating evaluation metrics","20 features is insufficient — the company should use all 500 features and rely on regularization to perform implicit selection","Proprietary feature selection algorithms cannot be validated by third parties and should not be used in production systems"],a:1},
  {q:"A team deploys a predictive maintenance model that flags machines likely to fail in the next 7 days. The model has 90% precision and 60% recall. Operations managers complain that too many failures are missed. What trade-off adjustment would address their concern?",opts:["Retrain the model with a larger dataset since 60% recall indicates insufficient training data for rare failure events","Lower the classification threshold so more machines are flagged as at-risk — this improves recall (fewer missed failures) at the cost of lower precision (more false alarms)","Switch the evaluation metric from precision/recall to AUC-ROC since that metric is more appropriate for imbalanced maintenance data","Add more input features (sensor readings, maintenance history) to give the model more signal for detecting imminent failures"],a:1},
  {q:"A team builds a generative image model and evaluates it using FID (Fréchet Inception Distance). The FID score is excellent. However, domain experts reviewing the images say they all look very similar — the model lacks variety. What does this reveal about FID?",opts:["FID is incorrectly implemented — a correct implementation would penalize low-diversity outputs proportionally to the degree of repetition","FID measures distributional similarity between real and generated images but can be fooled by mode collapse if generated images closely match a subset of real images","FID scores above 10 always indicate mode collapse regardless of how similar or diverse the generated images appear to human judges","The domain experts lack familiarity with statistical image quality metrics and are applying incorrect qualitative standards to a quantitative problem"],a:1},
  {q:"A researcher compares two ML models: one trained with stochastic gradient descent (SGD) and one with Adam. Adam converges faster and achieves lower training loss. On a held-out test set, SGD's model generalizes better. How is this possible?",opts:["Adam is a newer optimizer and always outperforms SGD — the researcher likely made an implementation error in the SGD baseline","SGD's noisier updates act as implicit regularization, often finding flatter minima that generalize better even if training loss is higher than Adam","Adam has a higher learning rate by default than SGD, causing it to overfit the training data more aggressively in early epochs","The test set was collected from a different time period than the training set, making it unfair to compare the two optimizers on this benchmark"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25).map(q=>{const ct=q.opts[q.a];const s=[...q.opts];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return{...q,opts:s,a:s.indexOf(ct)};});userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='ML-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{mlCertId:id},{merge:true});await setDoc(doc(db,'certificates',id),{name:currentUser.displayName||'Meridian Student',email:currentUser.email,course:'Machine Learning — Meridian Institute of AI',issuedAt:new Date(),certId:id,valid:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of Machine Learning.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
