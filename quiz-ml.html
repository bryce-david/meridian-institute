<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Machine Learning — Meridian Institute of AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#080808;--bg-2:#111111;--bg-3:#1a1a1a;--bg-4:#222222;--text:#f0f0f0;--text-2:#a0a0a0;--text-3:#606060;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.15);--accent:#065F46;--accent-dim:rgba(6,95,70,0.1);--nav-bg:rgba(8,8,8,0.9);}
  :root[data-theme="light"]{--bg:#fafaf8;--bg-2:#f0f0ec;--bg-3:#e8e8e2;--bg-4:#ddddd6;--text:#0a0a0a;--text-2:#555550;--text-3:#999990;--border:rgba(0,0,0,0.08);--border-2:rgba(0,0,0,0.15);--accent:#064e3b;--accent-dim:rgba(6,78,59,0.08);--nav-bg:rgba(250,250,248,0.9);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:16px;}.nav-logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;}
  .nav-divider{width:1px;height:16px;background:var(--border-2);}.nav-back{font-size:13px;color:var(--text-2);text-decoration:none;}
  .theme-toggle{width:32px;height:32px;border-radius:7px;border:1px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
  .quiz-wrap{max-width:720px;margin:0 auto;padding:100px 32px 80px;}
  .quiz-header{text-align:center;margin-bottom:48px;}
  .quiz-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(6,95,70,0.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:16px;}
  .quiz-subhead{font-size:16px;color:var(--text-2);font-weight:300;}
  .quiz-meta{display:flex;gap:24px;justify-content:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
  .quiz-meta-item{font-size:13px;color:var(--text-3);}
  .start-btn{display:block;width:100%;max-width:320px;margin:32px auto 0;padding:14px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}.start-btn:hover{opacity:0.88;}
  #quiz-area{display:none;}
  .q-block{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;}
  .q-num{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:20px;}
  .q-options{display:flex;flex-direction:column;gap:10px;}
  .q-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:15px;color:var(--text-2);line-height:1.5;background:var(--bg-3);}
  .q-opt:hover{border-color:var(--accent);color:var(--text);}.q-opt input[type=radio]{accent-color:var(--accent);margin-top:3px;flex-shrink:0;}
  .q-opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
  .quiz-submit{display:block;width:100%;padding:15px 0;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}.quiz-submit:hover{opacity:0.88;}.quiz-submit:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:60px 0;}
  .result-icon{font-size:56px;margin-bottom:16px;}.result-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;margin-bottom:12px;}
  .result-score{font-size:20px;color:var(--text-2);margin-bottom:8px;}.result-msg{font-size:15px;color:var(--text-3);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;}
  .cert-box{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin:0 auto 32px;max-width:440px;}
  .cert-label{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}.cert-id{font-size:14px;color:var(--text-2);font-family:monospace;word-break:break-all;}
  .result-btn{display:inline-block;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
  .result-btn-primary{background:var(--accent);color:#fff;margin-right:10px;}.result-btn-primary:hover{opacity:0.88;}
  .result-btn-secondary{background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);}.result-btn-secondary:hover{color:var(--text);}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo-mark">M</a>
    <div class="nav-divider"></div>
    <a href="courses.html" class="nav-back">← All Courses</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
</nav>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-tag">Final Assessment</div>
    <h1>Machine Learning</h1>
    <p class="quiz-subhead">25 questions · 70% required to pass · Earn your certificate</p>
    <div class="quiz-meta">
      <span class="quiz-meta-item">25 questions</span>
      <span class="quiz-meta-item">~15 minutes</span>
      <span class="quiz-meta-item">Passing: 18 / 25</span>
    </div>
  </div>
  <div id="start-screen">
    <button class="start-btn" onclick="startQuiz()">Begin Assessment</button>
  </div>
  <div id="quiz-area">
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>
    <div id="questions-container"></div>
    <button class="quiz-submit" id="submit-btn" onclick="submitQuiz()" disabled>Submit Assessment</button>
  </div>
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="cert-box" id="cert-box" style="display:none;"><div class="cert-label">Certificate ID</div><div class="cert-id" id="cert-id-text"></div></div>
    <button class="result-btn result-btn-primary" onclick="window.location.href='courses.html'">Back to Courses</button>
    <button class="result-btn result-btn-secondary" id="retry-btn" onclick="retryQuiz()" style="display:none;">Retry Assessment</button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCIi2144rkUBIFfFPif0mgJ25z9mbseVKU",authDomain:"meridian-institute.firebaseapp.com",projectId:"meridian-institute",storageBucket:"meridian-institute.firebasestorage.app",messagingSenderId:"355371012929",appId:"1:355371012929:web:244fc2f15ee8ac656887c0"});
const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;});
window.toggleTheme=function(){const h=document.documentElement,i=document.getElementById('theme-icon');h.getAttribute('data-theme')==='dark'?(h.setAttribute('data-theme','light'),i.textContent='☾'):(h.setAttribute('data-theme','dark'),i.textContent='☀');};

const ALL_QUESTIONS=[
  {q:"What is the core idea that distinguishes machine learning from traditional programming?",opts:["ML uses more powerful computers","Instead of writing explicit rules, ML systems learn patterns from data to make predictions or decisions","ML only works with images","ML requires no human input"],a:1},
  {q:"What is 'supervised learning'?",opts:["A human teacher watching an AI train","Learning from labeled examples — each input is paired with the correct output so the model can learn the mapping","Learning without any data","Learning by reinforcement from an environment"],a:1},
  {q:"What is 'unsupervised learning'?",opts:["Learning without a computer","Finding patterns in data without labeled examples — the model discovers structure such as clusters or representations on its own","Learning with partial labels","A type of reinforcement learning"],a:1},
  {q:"What does 'training' a model mean?",opts:["Writing the model's code","Adjusting the model's parameters (weights) by exposing it to data and using a loss function to measure and minimize error","Testing the model on new data","Deploying the model to production"],a:1},
  {q:"What is 'overfitting'?",opts:["Making a model too complex to run","When a model learns the training data too specifically — including noise — and fails to generalize to new, unseen data","When a model is trained on too little data","When a model is too fast"],a:1},
  {q:"What is a 'loss function' in machine learning?",opts:["A function that slows down training","A mathematical measure of how wrong the model's predictions are — training optimizes parameters to minimize this value","The model's total compute cost","A regularization technique"],a:1},
  {q:"What does 'gradient descent' do?",opts:["It finds the steepest hill in a dataset","It iteratively adjusts model parameters in the direction that reduces the loss function — the core optimization method in ML","It downloads training data","It initializes model weights randomly"],a:1},
  {q:"What is a 'neural network'?",opts:["A biological brain","A computational model of interconnected layers of nodes (neurons) that learn hierarchical representations of data through backpropagation","A type of decision tree","A database structure"],a:1},
  {q:"What is 'backpropagation'?",opts:["Running data through the network backwards","The algorithm that computes gradients of the loss with respect to each parameter by propagating error signals backward through the network","A data augmentation technique","A method for pruning unused neurons"],a:1},
  {q:"What does 'deep learning' specifically refer to?",opts:["Learning very complex topics","Neural networks with many hidden layers — the depth enables learning of hierarchical, abstract feature representations","Any ML model with high accuracy","Learning from very large datasets"],a:1},
  {q:"What is a 'transformer' architecture and why is it important?",opts:["A circuit that transforms voltage","A neural network architecture based on self-attention mechanisms — the foundation of modern LLMs and most state-of-the-art NLP, vision, and multimodal models","A type of convolutional network","A method for data preprocessing"],a:1},
  {q:"What is 'attention' in the context of transformer models?",opts:["The model's focus on training data","A mechanism that allows the model to weight the relevance of different parts of the input relative to each other when making predictions","A regularization technique","A way to reduce model size"],a:1},
  {q:"What is 'transfer learning'?",opts:["Moving a model to a new server","Using a model pre-trained on a large dataset as a starting point, then fine-tuning it on a smaller domain-specific dataset — saves enormous compute","Transferring data between systems","A technique for data augmentation"],a:1},
  {q:"What is the difference between 'classification' and 'regression' tasks?",opts:["They use different programming languages","Classification predicts a discrete category; regression predicts a continuous numerical value","Classification is always more accurate","Regression only works with time series"],a:1},
  {q:"What is 'cross-validation'?",opts:["Validating code across programming languages","A technique for estimating model performance by training and evaluating on multiple different splits of the data — reduces overfitting to a single validation set","A debugging technique","A data collection method"],a:1},
  {q:"What is a 'confusion matrix' used for?",opts:["Displaying confusing data","A table showing the counts of true positives, false positives, true negatives, and false negatives — used to evaluate classification model performance","A visualization of training loss","A way to compare models"],a:1},
  {q:"What is 'data augmentation' and why is it used?",opts:["Adding more features to data","Artificially expanding a training dataset by applying transformations (rotations, flips, noise) to existing examples — improves generalization and reduces overfitting","Cleaning data of errors","Normalizing data distributions"],a:1},
  {q:"What is 'regularization' in machine learning?",opts:["Making models comply with regulations","Techniques (L1/L2 penalty, dropout) that add constraints to prevent overfitting by discouraging overly complex model parameters","A data preprocessing step","A method for speeding up training"],a:1},
  {q:"What is a 'hyperparameter' and how does it differ from a model parameter?",opts:["They are the same thing","Parameters are learned from data during training (weights); hyperparameters are set before training (learning rate, batch size, number of layers)","Hyperparameters are always integers","Parameters are set by the developer"],a:1},
  {q:"What is 'feature engineering' and when is it important?",opts:["Building physical hardware features","Transforming raw data into representations that better capture patterns relevant to the prediction task — more critical in classical ML than deep learning","A method for selecting models","A data collection strategy"],a:1},
  {q:"What is 'model drift' in production ML systems?",opts:["Models moving to new servers","The degradation of model performance over time as the real-world data distribution shifts away from the training distribution","A type of overfitting","Memory leaks in ML code"],a:1},
  {q:"What is 'precision' and 'recall' as evaluation metrics?",opts:["Synonyms for accuracy and speed","Precision measures what fraction of positive predictions are correct; recall measures what fraction of actual positives were identified — trade off against each other","Both measure overall model accuracy","Metrics only used for regression"],a:1},
  {q:"What does 'batch size' affect in neural network training?",opts:["The number of model layers","The number of examples processed before updating weights — smaller batches add noise that can help escape local minima; larger batches give more stable gradients","The model's vocabulary size","The number of training epochs"],a:1},
  {q:"What is 'convolutional neural network' (CNN) primarily used for?",opts:["Text processing","Image and spatial data tasks — convolutional layers learn local spatial features (edges, textures, objects) efficiently by sharing weights across positions","Time series prediction","Audio processing only"],a:1},
  {q:"What is the 'bias-variance tradeoff' in machine learning?",opts:["A tradeoff between speed and accuracy","The tension between underfitting (high bias — model too simple) and overfitting (high variance — model too complex) — good models balance both","A pricing consideration","A hardware limitation"],a:1}
];

let activeQuestions=[];let userAnswers={};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
window.startQuiz=function(){activeQuestions=shuffle(ALL_QUESTIONS).slice(0,25);userAnswers={};document.getElementById('start-screen').style.display='none';document.getElementById('quiz-area').style.display='block';renderQuestions();};
function renderQuestions(){const c=document.getElementById('questions-container');c.innerHTML=activeQuestions.map((q,qi)=>`<div class="q-block" id="qb-${qi}"><div class="q-num">Question ${qi+1} of ${activeQuestions.length}</div><div class="q-text">${q.q}</div><div class="q-options">${q.opts.map((o,oi)=>`<label class="q-opt" id="opt-${qi}-${oi}"><input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">${o}</label>`).join('')}</div></div>`).join('');}
window.selectOpt=function(qi,oi){userAnswers[qi]=oi;activeQuestions[qi].opts.forEach((_,i)=>{const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.toggle('selected',i===oi);});const answered=Object.keys(userAnswers).length;document.getElementById('q-progress').style.width=(answered/activeQuestions.length*100)+'%';document.getElementById('submit-btn').disabled=answered<activeQuestions.length;};
window.submitQuiz=async function(){let correct=0;activeQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)correct++;});const pct=Math.round(correct/activeQuestions.length*100);const passed=pct>=70;if(passed&&currentUser){try{const id='ML-'+Date.now();await setDoc(doc(db,'users',currentUser.uid),{mlCertId:id},{merge:true});document.getElementById('cert-id-text').textContent=id;document.getElementById('cert-box').style.display='block';}catch(e){}}document.getElementById('quiz-area').style.display='none';document.getElementById('result-icon').textContent=passed?'🎓':'📖';document.getElementById('result-title').textContent=passed?'Certificate Earned':'Keep Studying';document.getElementById('result-score').textContent=`${correct} / ${activeQuestions.length} correct (${pct}%)`;document.getElementById('result-msg').textContent=passed?'Congratulations! You\'ve demonstrated a solid understanding of Machine Learning.':'You need 70% to pass. Review the modules and try again when you\'re ready.';if(!passed){document.getElementById('retry-btn').style.display='inline-block';}document.getElementById('result-screen').style.display='block';};
window.retryQuiz=function(){document.getElementById('result-screen').style.display='none';document.getElementById('cert-box').style.display='none';document.getElementById('retry-btn').style.display='none';window.startQuiz();};
</script>
</body>
</html>
